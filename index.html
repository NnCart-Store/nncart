<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: 0.3s; left: -100%; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-pink-600 italic mb-2 text-center">NnCart</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Login to start shopping</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="userEmail" placeholder="Gmail ID" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <input type="password" id="userPass" placeholder="Password" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <button type="submit" class="w-full nn-pink text-white py-4 rounded-xl font-bold shadow-lg">Login Now</button>
            </form>
        </div>
    </div>

    <div id="sidebar" class="shadow-2xl overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-pink-600 font-bold text-xl italic">All Categories</h2>
            <button onclick="toggleMenu()" class="text-2xl text-gray-400">&times;</button>
        </div>
        <nav class="p-4 space-y-4 font-medium text-gray-700">
            <a href="#" class="block p-2 border-b">👞 Shoes & Sandals</a>
            <a href="#" class="block p-2 border-b">👡 Chappal</a>
            <a href="#" class="block p-2 border-b">👕 T-Shirt & Sando</a>
            <a href="#" class="block p-2 border-b">👔 Pant Shirt & Trouser</a>
            <a href="#" class="block p-2 border-b">👗 Saari & Kurti</a>
            <a href="#" onclick="logout()" class="block p-2 border-b text-red-500">🚪 Logout</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4 text-xl">🔍 🛒</div>
    </header>

    <main class="p-3">
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-6 text-white mb-6 text-center shadow-lg">
            <h2 class="text-xl font-bold">Today's Special Deal</h2>
            <p class="text-sm opacity-90">Up to 60% Off</p>
        </div>

        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-6 pb-2" id="category-filters">
            <button onclick="filterProducts('all')" class="nn-pink text-white px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold">All</button>
            <button onclick="filterProducts('jins')" class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Jins</button>
            <button onclick="filterProducts('saari')" class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Saari</button>
            <button onclick="filterProducts('shirt')" class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Shirt</button>
        </div>

        <div id="product-list" class="grid grid-cols-2 gap-4 pb-20"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Delivery Details</h3>
            <form id="orderForm" class="space-y-3">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                <input type="text" id="c_name" placeholder="Apna Naam" required class="w-full border p-3 rounded-lg outline-none">
                <input type="tel" id="c_phone" placeholder="WhatsApp Number" required class="w-full border p-3 rounded-lg outline-none">
                <textarea id="c_address" placeholder="Pura Pata (Address)" required class="w-full border p-3 rounded-lg outline-none h-24"></textarea>
                <div class="flex gap-3">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-3 font-bold text-gray-400">Back</button>
                    <button type="submit" class="flex-1 nn-pink text-white py-3 rounded-xl font-bold">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (!localStorage.getItem("nncart_logged_in")) {
                document.getElementById('loginModal').classList.add('active');
            }
            loadProducts();
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem("nncart_logged_in", "true");
            document.getElementById('loginModal').classList.remove('active');
        };

        function logout() { localStorage.removeItem("nncart_logged_in"); location.reload(); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
        let allProducts = [];

        async function loadProducts() {
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                allProducts = json.table.rows;
                displayProducts(allProducts);
            } catch (error) { console.log("Error:", error); }
        }

        function displayProducts(rows, filter = 'all') {
            let html = '';
            rows.forEach((row, index) => {
                if(index === 0) return;
                const name = row.c[0]?.v || 'Product';
                const price = row.c[1]?.v || '0';
                const category = row.c[2]?.v ? row.c[2].v.toLowerCase() : '';
                const img = row.c[3]?.v || 'https://via.placeholder.com/150';

                if(filter === 'all' || category === filter) {
                    html += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                        <img src="${img}" class="w-full h-40 object-cover rounded-xl mb-3">
                        <h3 class="font-bold text-sm truncate">${name}</h3>
                        <p class="text-pink-600 font-black mt-1">₹${price}</p>
                        <button onclick="openOrder('${name}', '${price}')" class="w-full mt-2 py-2 text-xs font-bold border border-pink-500 text-pink-500 rounded-lg">Buy Now</button>
                    </div>`;
                }
            });
            document.getElementById('product-list').innerHTML = html;
        }

        function filterProducts(cat) { displayProducts(allProducts, cat); }

        // --- ORDER HANDLING ---
        function openOrder(title, price) {
            document.getElementById('p_title').value = title;
            document.getElementById('p_price').value = price;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('c_name').value;
            const phone = document.getElementById('c_phone').value;
            const address = document.getElementById('c_address').value;
            const product = document.getElementById('p_title').value;
            const price = document.getElementById('p_price').value;

            const message = `*NnCart - Naya Order!*%0A------------------%0A*Item:* ${product}%0A*Price:* ₹${price}%0A------------------%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}`;
            
            // Apna WhatsApp number yahan daalein (Bina + ke)
            window.open(`https://wa.me/91XXXXXXXXXX?text=${message}`, '_blank');
            closeOrder();
        };
    </script>
</body>
</html>
