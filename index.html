                <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col shadow-2xl font-sans">
        <div class="nn-pink p-8 text-white"><h2 class="text-3xl font-black italic">NnCart</h2></div>
        <nav class="flex-1 p-6 space-y-6">
            <a href="#" class="block font-bold text-gray-700 text-lg border-b pb-3">🏠 Home</a>
            <a href="#" class="block font-bold text-gray-700 text-lg border-b pb-3">🛒 My Orders</a>
            <a href="#" class="block font-bold text-pink-600 text-lg border-b pb-3">📞 Contact Us</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="text-3xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic">NnCart</h1>
        </div>
        <div class="text-2xl text-gray-600">🛒</div>
    </header>

    <div class="p-4 bg-white border-b"><input type="text" id="searchInput" placeholder="Search products..." class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold"></div>

    <main class="px-3 mt-4">
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-center border-b pb-4">Order Now</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <select id="p_size" required class="w-full border p-4 rounded-2xl font-bold"></select>
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-4 rounded-2xl">
                <input type="tel" id="c_phone" placeholder="Phone" required class="w-full border p-4 rounded-2xl">
                <textarea id="c_address" placeholder="Address" required class="w-full border p-4 rounded-2xl h-24"></textarea>
                <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Order</button>
                <button type="button" onclick="closeOrder()" class="w-full text-center mt-4 text-gray-400 font-bold uppercase text-xs">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => {
                    let rawImg = row.c[2]?.v || "";
                    let finalImg = "";
                    
                    // Naya Direct Link Formula (Isse photo load hogi hi hogi)
                    if(rawImg.includes('drive.google.com')){
                        let fileID = "";
                        if(rawImg.includes('/d/')){
                            fileID = rawImg.split('/d/')[1].split('/')[0];
                        } else if(rawImg.includes('id=')){
                            fileID = rawImg.split('id=')[1].split('&')[0];
                        }
                        finalImg = "https://lh3.googleusercontent.com/d/" + fileID;
                    } else {
                        finalImg = rawImg;
                    }

                    return {
                        name: row.c[0]?.v || "",
                        price: row.c[1]?.v || "0",
                        img: finalImg
                    };
                }).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { console.error("Error loading products"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                const cat = p.name.toLowerCase().match(/shoe|joota|sandal/) ? "shoes" : "cloth";
                html += `
                <div class="bg-white rounded-[1.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between">
                    <img src="${p.img}" class="w-full h-44 object-cover" onerror="this.src='https://via.placeholder.com/200?text=No+Photo'">
                    <div class="p-3">
                        <h3 class="font-bold text-[12px] truncate text-gray-700 uppercase">${p.name}</h3>
                        <p class="text-pink-600 font-black text-lg">₹${p.price}</p>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-3 rounded-xl text-[10px] font-black uppercase mt-2 shadow-md">
                            Buy Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(t, p, cat) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('modalTitle').innerText = t;
            const sd = document.getElementById('p_size');
            sd.innerHTML = '<option value="">Select Size</option>';
            if(cat === "shoes") { [6,7,8,9,10].forEach(n => sd.innerHTML += `<option value="${n}">${n} No.</option>`); }
            else { ['S','M','L','XL','XXL'].forEach(s => sd.innerHTML += `<option value="${s}">${s}</option>`); }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Placing..."; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const res = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const r = await res.json();
                if (r.created === 1) {
                    btn.innerHTML = "✅ SUCCESS";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 2000); 
                }
            } catch (error) { alert("Error!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
