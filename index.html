<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Shoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-pink-600 text-white p-4 text-center font-bold text-xl">NnCart Store</header>
    <div id="product-list" class="grid grid-cols-2 gap-4 p-4">
        </div>

    <script>
        // Aapki Sheet ID jo screenshot mein hai
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        // Ye special link hai jo bina publish kiye data deta hai
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                // Google JSON format ko saaf karne ke liye
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let html = '';
                rows.forEach(row => {
                    const name = row.c[0] ? row.c[0].v : 'No Name';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const img = row.c[2] ? row.c[2].v : '';

                    if(img) {
                        html += `
                        <div class="bg-white p-2 rounded-lg shadow">
                            <img src="${img}" class="w-full h-40 object-contain">
                            <h2 class="text-sm font-bold mt-2">${name}</h2>
                            <p class="text-pink-600 font-bold">₹${price}</p>
                            <button class="w-full bg-pink-500 text-white py-1 mt-2 rounded text-sm">Buy Now</button>
                        </div>`;
                    }
                });
                document.getElementById('product-list').innerHTML = html;
            } catch (e) {
                document.getElementById('product-list').innerHTML = "Sheet check karein!";
            }
        }
        loadProducts();
    </script>
</body>
</html>
