<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meesho-pink { background-color: #f43397; }
        .product-card { border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); background: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { color: #f43397; border-bottom: 3px solid #f43397; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="meesho-pink p-4 sticky top-0 z-50">
        <div class="flex items-center justify-between text-white mb-3">
            <h1 class="text-xl font-bold italic">NnCart</h1>
            <div class="flex gap-4 text-xl"><span>🔍</span><span>🛒</span></div>
        </div>
        <input type="text" placeholder="Search for products..." class="w-full p-2 rounded-md outline-none text-sm">
    </header>

    <div class="p-3">
        <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
            <h2 class="text-gray-800 font-bold text-md">Special Offer for You! 🛍️</h2>
            <p id="desc" class="text-gray-500 text-xs mt-1">NnCart par pehli baar shopping karne par aapko milega bhari discount...</p>
            <button onclick="toggleReadMore()" id="readBtn" class="text-pink-600 text-xs font-bold mt-2">Read More</button>
        </div>
    </div>

    <div class="flex gap-6 overflow-x-auto px-5 py-2 bg-white border-b no-scrollbar">
        <button onclick="filterCat('All', this)" class="cat-btn text-sm whitespace-nowrap active-cat pb-1">All</button>
        <button onclick="filterCat('Ladies', this)" class="cat-btn text-sm whitespace-nowrap pb-1 text-gray-500">Ladies Wear</button>
        <button onclick="filterCat('Sports', this)" class="cat-btn text-sm whitespace-nowrap pb-1 text-gray-500">Sports & Shoes</button>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
        <p class="col-span-2 text-center py-10 text-gray-400">Loading Products...</p>
    </div>

    <script>
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
        let allProducts = [];

        // Read More Function
        function toggleReadMore() {
            const desc = document.getElementById('desc');
            const btn = document.getElementById('readBtn');
            if (btn.innerText === "Read More") {
                desc.innerText = "NnCart par pehli baar shopping karne par aapko milega 20% discount aur Free Delivery har order par. Aaj hi apna favourite product choose karein!";
                btn.innerText = "Read Less";
            } else {
                desc.innerText = "NnCart par pehli baar shopping karne par aapko milega bhari discount...";
                btn.innerText = "Read More";
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                allProducts = rows.slice(1).map(row => ({
                    name: row.c[0] ? row.c[0].v : 'Product',
                    price: row.c[1] ? row.c[1].v : '0',
                    img: row.c[2] ? row.c[2].v : '',
                    cat: row.c[3] ? row.c[3].v : 'All'
                }));
                displayProducts(allProducts);
            } catch (e) {
                document.getElementById('product-list').innerHTML = "Connection Error!";
            }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                if(p.img) {
                    html += `
                    <div class="product-card">
                        <img src="${p.img.trim()}" class="w-full h-44 object-contain p-2">
                        <div class="p-2">
                            <p class="text-gray-500 text-[11px] truncate">${p.name}</p>
                            <p class="text-lg font-bold text-gray-900">₹${p.price}</p>
                            <button class="mt-2 w-full meesho-pink text-white text-[10px] py-2 rounded font-bold uppercase">Buy Now</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('product-list').innerHTML = html || "<p class='col-span-2 text-center text-gray-400 py-10'>No Items Found</p>";
        }

        function filterCat(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            
            if(category === 'All') {
                displayProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.cat.includes(category));
                displayProducts(filtered);
            }
        }

        loadProducts();
    </script>
</body>
</html>
