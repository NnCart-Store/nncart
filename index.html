<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: 0.3s; left: -100%; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginModal" class="modal active">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-pink-600 italic mb-2 text-center">NnCart</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Login to start shopping</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" placeholder="Gmail ID" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <input type="password" placeholder="Password" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <button type="submit" class="w-full nn-pink text-white py-4 rounded-xl font-bold shadow-lg">Login Now</button>
            </form>
        </div>
    </div>

    <div id="sidebar" class="shadow-2xl overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-pink-600 font-bold text-xl italic">All Categories</h2>
            <button onclick="toggleMenu()" class="text-2xl text-gray-400">&times;</button>
        </div>
        <nav class="p-4 space-y-4 font-medium text-gray-700">
            <a href="#" class="block p-2 border-b">👞 Shoes & Sandals</a>
            <a href="#" class="block p-2 border-b">👡 Chappal</a>
            <a href="#" class="block p-2 border-b">👕 T-Shirt & Sando</a>
            <a href="#" class="block p-2 border-b">👔 Pant Shirt & Trouser</a>
            <a href="#" class="block p-2 border-b">👗 Saari & Kurti</a>
            <a href="#" class="block p-2 border-b">🧸 Kids Wear</a>
            <a href="#" class="block p-2 border-b">👶 Kids Chappal</a>
            <a href="#" class="block p-2 border-b text-red-500">🚪 Logout</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4 text-xl">🔍 🛒</div>
    </header>

    <main class="p-3">
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-6 text-white mb-6 text-center shadow-lg">
            <h2 class="text-xl font-bold">Today's Special Deal</h2>
            <p class="text-sm opacity-90">Up to 60% Off on Kids Wear</p>
        </div>

        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-6 pb-2">
            <button class="nn-pink text-white px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold">All Products</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Shoes</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Saari</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap text-sm font-medium">Kurti</button>
        </div>

        <div id="product-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Delivery Address</h3>
            <form id="orderForm" class="space-y-3">
                <input type="hidden" id="p_title">
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-3 rounded-lg outline-none">
                <input type="tel" id="c_phone" placeholder="Phone Number" required class="w-full border p-3 rounded-lg outline-none">
                <textarea id="c_address" placeholder="Full Address with Landmark" required class="w-full border p-3 rounded-lg outline-none h-24"></textarea>
                <div class="flex gap-3">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-3 font-bold text-gray-400">Back</button>
                    <button type="submit" class="flex-1 nn-pink text-white py-3 rounded-xl font-bold">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        // Login Handle
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loginModal').classList.remove('active');
        };

        // --- Sheet Data Loading ---
        const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                const rows = json.table.rows;
                let html = '';

                rows.forEach((row, index) => {
                    if(index === 0) return;
                    const name = row.c[0]?.v || 'Product';
                    const price = row.c[1]?.v || '0';
                    const img = row.c[2]?.v || 'https://via.placeholder.com/150';

                    html += `
                    <div class="bg-white rounded-2xl shadow-sm border p-3 flex flex-col hover:shadow-md">
                        <img src="${img}" class="w-full h-40 object-contain rounded-xl">
                        <div class="mt-3">
                            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-wider">NnCart Exclusive</p>
                            <h4 class="text-sm font-bold text-gray-800 truncate">${name}</h4>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-lg font-black">₹${price}</span>
                                <span class="text-[10px] text-green-500 font-bold">Free Shipping</span>
                            </div>
                            <button onclick="openOrder('${name}')" class="w-full nn-pink text-white mt-3 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">Buy Now</button>
                        </div>
                    </div>`;
                });
                document.getElementById('product-list').innerHTML = html;
            } catch(e) { console.log("Error loading sheet!"); }
        }

        function openOrder(name) {
            document.getElementById('p_title').value = name;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Order Placed Successfully!\nBhai, ab humein Google Script lagani hogi taaki ye order aapki sheet mein dikhe.");
            closeOrder();
        };

        loadProducts();
    </script>
</body>
</html>
