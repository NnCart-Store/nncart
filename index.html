<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: 0.3s; left: -100%; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-pink-600 italic mb-2 text-center">NnCart</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Login to start shopping</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" placeholder="Gmail ID" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <input type="password" placeholder="Password" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <button type="submit" class="w-full nn-pink text-white py-4 rounded-xl font-bold shadow-lg">Login Now</button>
            </form>
        </div>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4 text-xl">🔍 🛒</div>
    </header>

    <main class="p-3">
        <div id="product-list" class="grid grid-cols-2 gap-4 pb-24">
            </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Confirm Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                
                <div>
                    <label class="text-xs font-bold text-gray-400">SELECT SIZE</label>
                    <select id="p_size" required class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:border-pink-500">
                        <option value="">Choose Size...</option>
                        <option value="S">S</option><option value="M">M</option>
                        <option value="L">L</option><option value="XL">XL</option>
                        <option value="7">7</option><option value="8">8</option>
                        <option value="9">9</option><option value="10">10</option>
                    </select>
                </div>

                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <input type="tel" id="c_phone" placeholder="Phone Number" required class="w-full border p-3 rounded-xl outline-none focus:border-pink-500">
                <textarea id="c_address" placeholder="Full Address" required class="w-full border p-3 rounded-xl outline-none h-24 focus:border-pink-500"></textarea>
                
                <div class="flex gap-3">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-3 text-gray-400">Back</button>
                    <button type="submit" id="orderBtn" class="flex-1 nn-pink text-white py-4 rounded-xl font-bold">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. LOGIN & SIDEBAR ---
        window.onload = () => {
            if (!localStorage.getItem("nn_isLoggedIn")) document.getElementById('loginModal').classList.add('active');
            loadProducts();
        };
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem("nn_isLoggedIn", "true");
            document.getElementById('loginModal').classList.remove('active');
        };
        function toggleMenu() { /* Sidebar Toggle Code */ }

        // --- 2. LOAD PRODUCTS ---
        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                let html = '';
                json.table.rows.forEach((row, i) => {
                    if(i===0) return;
                    const name = row.c[0]?.v, price = row.c[1]?.v, img = row.c[3]?.v || 'https://via.placeholder.com/150';
                    html += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <img src="${img}" class="w-full h-40 object-cover rounded-xl mb-2">
                        <h3 class="font-bold text-sm truncate">${name}</h3>
                        <p class="text-pink-600 font-black">₹${price}</p>
                        <button onclick="openOrder('${name}', '${price}')" class="w-full mt-2 py-2 border-2 border-pink-500 text-pink-500 rounded-xl text-xs font-bold">Buy Now</button>
                    </div>`;
                });
                document.getElementById('product-list').innerHTML = html;
            } catch(e) { console.log("Error loading products"); }
        }

        // --- 3. ORDER HANDLING (SheetDB System) ---
        function openOrder(t, p) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('orderModal').classList.add('active');
        }
        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Booking...";
            btn.disabled = true;

            const orderData = {
                "data": [{
                    "Product": document.getElementById('p_title').value,
                    "Price": document.getElementById('p_price').value,
                    "Size": document.getElementById('p_size').value,
                    "Customer_Name": document.getElementById('c_name').value,
                    "Phone": document.getElementById('c_phone').value,
                    "Address": document.getElementById('c_address').value,
                    "Time": new Date().toLocaleString()
                }]
            };

            try {
                // IMPORTANT: Replace the URL below with your SheetDB API URL
                const response = await fetch('https://sheetdb.io/api/v1/APNA_ID_DAALEIN', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if(response.ok) {
                    alert("✅ Order Successful! Hum jald hi aapse sampark karenge.");
                    closeOrder();
                    e.target.reset();
                } else {
                    alert("❌ Error! API Check Karein.");
                }
            } catch (err) {
                alert("❌ Connection Error!");
            }
            btn.innerText = "Confirm Order";
            btn.disabled = false;
        };
    </script>
</body>
</html>
