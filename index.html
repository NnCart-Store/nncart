<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NN CART | Premium Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Smooth Scrolling */
        html { scroll-behavior: smooth; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }

        /* Product Card Glassmorphism */
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .product-card:active { transform: scale(0.96); }

        .img-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
        }

        .img-container img {
            transition: transform 0.5s ease;
        }

        /* Modal Animation */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Badge Animation */
        .badge-new {
            background: linear-gradient(45deg, #ef4444, #f97316);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-900">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fa-solid fa-bolt text-white text-xs"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter text-gray-800 uppercase">NN<span class="text-blue-600">CART</span></h1>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
                <i class="fa-solid fa-bell"></i>
                <div class="relative">
                    <i class="fa-solid fa-bag-shopping text-xl text-gray-800"></i>
                    <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                </div>
            </div>
        </div>

        <div class="px-4 pb-3">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-600 transition-colors"></i>
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search latest sneakers..." 
                class="w-full bg-gray-100 border-none rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
        </div>
    </header>

    <div class="flex gap-3 overflow-x-auto px-4 py-4 no-scrollbar">
        <button onclick="filterCategory('all')" class="cat-btn active px-6 py-2 bg-blue-600 text-white rounded-full text-xs font-bold shadow-lg shadow-blue-100 whitespace-nowrap">All Items</button>
        <button onclick="filterCategory('shoes')" class="cat-btn px-6 py-2 bg-white text-gray-500 border border-gray-100 rounded-full text-xs font-bold whitespace-nowrap">Sneakers</button>
        <button onclick="filterCategory('apparel')" class="cat-btn px-6 py-2 bg-white text-gray-500 border border-gray-100 rounded-full text-xs font-bold whitespace-nowrap">Apparel</button>
        <button onclick="filterCategory('trending')" class="cat-btn px-6 py-2 bg-white text-gray-500 border border-gray-100 rounded-full text-xs font-bold whitespace-nowrap">Trending</button>
    </div>

    <main id="productGrid" class="px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-32">
        <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
            <div class="loader mb-4"></div>
            <p class="text-xs font-medium uppercase tracking-widest">Loading Inventory...</p>
        </div>
    </main>

    <div id="buyModal" class="modal flex items-end sm:items-center justify-center">
        <div class="modal-content bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl relative">
            <div onclick="closeModal()" class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden cursor-pointer"></div>
            
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-black text-gray-900 leading-tight">Product Name</h2>
                    <p class="text-blue-600 font-bold text-lg mt-1" id="modalPrice">₹0.00</p>
                </div>
                <button onclick="closeModal()" class="hidden sm:block text-gray-300 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-3xl"></i>
                </button>
            </div>

            <form id="orderForm" class="space-y-5">
                <input type="hidden" id="p_name">
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Available Sizes</label>
                    <div id="sizeGrid" class="grid grid-cols-4 gap-2">
                        </div>
                    <input type="hidden" id="selectedSize" required>
                </div>

                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="c_name" placeholder="Enter Full Name" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-semibold" required>
                </div>

                <div class="relative">
                    <i class="fa-solid fa-whatsapp absolute left-4 top-4 text-gray-400"></i>
                    <input type="tel" id="c_phone" placeholder="WhatsApp Number" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-semibold" required>
                </div>

                <div class="relative">
                    <i class="fa-solid fa-location-dot absolute left-4 top-4 text-gray-400"></i>
                    <textarea id="c_address" placeholder="Delivery Address with Landmark" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-semibold h-24" required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gray-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 uppercase tracking-widest text-sm">
                    Confirm Order
                </button>
                <p class="text-center text-[10px] text-gray-400 font-medium">Free Delivery & Cash on Delivery Available</p>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-6 inset-x-4 bg-gray-900/95 backdrop-blur-lg rounded-[2rem] p-4 flex justify-around items-center text-gray-500 z-50 shadow-2xl border border-white/10">
        <button class="flex flex-col items-center gap-1 text-blue-400">
            <i class="fa-solid fa-house-chimney-window text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Shop</span>
        </button>
        <button class="flex flex-col items-center gap-1 hover:text-white transition-colors">
            <i class="fa-solid fa-fire-flame-curved text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">New</span>
        </button>
        <button class="flex flex-col items-center gap-1 hover:text-white transition-colors">
            <i class="fa-solid fa-heart text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Favs</span>
        </button>
        <button class="flex flex-col items-center gap-1 hover:text-white transition-colors">
            <i class="fa-solid fa-user-ninja text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const CONFIG = {
            SID: '1n71f3014u50qI7yE7eBf0o33rEw5oIsk_u_o3m6HIn8',
            SNAME: 'Sheet1',
            API: 'https://sheetdb.io/api/v1/rfknu3rjfri7s'
        };

        const DATA_URL = `https://docs.google.com/spreadsheets/d/${CONFIG.SID}/gviz/tq?tqx=out:json&sheet=${CONFIG.SNAME}`;
        let productList = [];

        // Fetch Data from Google Sheet
        async function init() {
            try {
                const response = await fetch(DATA_URL);
                const rawText = await response.text();
                const cleanJson = JSON.parse(rawText.substring(47, rawText.length - 2));
                
                productList = cleanJson.table.rows.map((row, idx) => {
                    const rawImg = row.c[4]?.v || ""; // Column E
                    let driveId = "";
                    let finalUrl = rawImg;

                    if(rawImg.includes('drive.google.com')) {
                        if(rawImg.includes('/d/')) driveId = rawImg.split('/d/')[1].split('/')[0];
                        else if(rawImg.includes('id=')) driveId = rawImg.split('id=')[1].split('&')[0];
                        if(driveId) finalUrl = `https://googleusercontent.com/profile/picture/0${driveId}`;
                    }

                    return {
                        id: idx,
                        name: row.c[0]?.v || "Unknown Item",
                        price: row.c[1]?.v || "0",
                        category: row.c[2]?.v || "shoes",
                        img: finalUrl
                    };
                }).filter(p => p.name !== "Unknown Item");

                render(productList);
            } catch (err) {
                console.error("Critical Error:", err);
                document.getElementById('productGrid').innerHTML = `<p class="col-span-full text-center py-10 text-red-500 font-bold">Failed to connect to store. Check Sheet settings.</p>`;
            }
        }

        // Render Cards to Grid
        function render(items) {
            const grid = document.getElementById('productGrid');
            if(items.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400 font-bold uppercase">No products found</p>`;
                return;
            }

            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-[2.5rem] p-3 product-card shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="img-container rounded-[2rem] bg-gray-50 mb-4 group">
                            <span class="absolute top-3 left-3 z-10 badge-new text-white text-[9px] font-black px-3 py-1 rounded-full uppercase italic">New Arrival</span>
                            <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110" 
                            onerror="this.src='https://via.placeholder.com/400x400.png?text=Image+Not+Found'">
                        </div>
                        <h3 class="font-bold text-gray-800 text-sm px-1 truncate uppercase tracking-tight">${p.name}</h3>
                        <div class="flex items-center gap-1 px-1 mt-1">
                            <i class="fa-solid fa-star text-[10px] text-yellow-400"></i>
                            <span class="text-[10px] font-bold text-gray-400">4.9 (120+ Reviews)</span>
                        </div>
                    </div>
                    <div class="px-1 mt-4">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-blue-600 font-black text-xl italic">₹${p.price}</span>
                            <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-lg">-20%</span>
                        </div>
                        <button onclick="openModal('${p.name}', '${p.price}')" 
                        class="w-full bg-gray-900 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-colors">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filter Logic
        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = productList.filter(p => p.name.toLowerCase().includes(query));
            render(filtered);
        }

        function filterCategory(cat) {
            // Update UI buttons
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'active', 'shadow-lg');
                btn.classList.add('bg-white', 'text-gray-500');
            });
            event.target.classList.add('bg-blue-600', 'text-white', 'active', 'shadow-lg');
            
            if(cat === 'all') render(productList);
            else {
                const filtered = productList.filter(p => p.category.toLowerCase() === cat);
                render(filtered);
            }
        }

        // Modal Logic
        function openModal(name, price) {
            document.getElementById('p_name').value = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = `₹${price}`;
            
            // Size Selection Logic (4-10)
            const sizeGrid = document.getElementById('sizeGrid');
            sizeGrid.innerHTML = '';
            [4,5,6,7,8,9,10].forEach(num => {
                const btn = document.createElement('div');
                btn.className = 'size-option border-2 border-gray-100 rounded-xl py-3 text-center font-black text-sm cursor-pointer hover:border-blue-500 transition-all';
                btn.innerText = num;
                btn.onclick = function() {
                    document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
                    this.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    document.getElementById('selectedSize').value = num;
                };
                sizeGrid.appendChild(btn);
            });

            document.getElementById('buyModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('buyModal').style.display = 'none';
        }

        // Order Submission
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const sz = document.getElementById('selectedSize').value;
            if(!sz) { alert("Please select a size first!"); return; }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `<div class="loader mx-auto"></div>`;
            btn.disabled = true;

            const orderData = {
                "Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Product": document.getElementById('p_name').value,
                "Size": sz,
                "Address": document.getElementById('c_address').value,
                "Timestamp": new Date().toLocaleString()
            };

            try {
                const response = await fetch(CONFIG.API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [orderData] })
                });

                if(response.ok) {
                    alert("🚀 Order Placed Successfully!");
                    closeModal();
                    e.target.reset();
                }
            } catch (err) {
                alert("❌ Connection Error! Try again.");
            } finally {
                btn.innerText = "Confirm Order";
                btn.disabled = false;
            }
        };

        // Window Clicks
        window.onclick = (e) => {
            if(e.target == document.getElementById('buyModal')) closeModal();
        };

        // Initialize App
        init();
    </script>
</body>
</html>
