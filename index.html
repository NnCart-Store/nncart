<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meesho-pink { background-color: #f43397; }
        .product-card { border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="meesho-pink p-4 sticky top-0 z-50">
        <div class="flex items-center justify-between text-white">
            <h1 class="text-xl font-bold italic">NnCart</h1>
            <div class="flex gap-4"><span>🔍</span><span>🛒</span></div>
        </div>
        <div class="mt-3">
            <input type="text" placeholder="Search for products..." class="w-full p-2 rounded-md outline-none text-gray-700 text-sm">
        </div>
    </header>

    <div class="p-2">
        <div class="bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
            <h2 class="text-gray-800 font-bold text-lg">Special Discount! 🛍️</h2>
            <p class="text-gray-600 text-sm">NnCart par pehli baar shopping karne par bhari discount milega. <span class="text-pink-600 font-bold">Read More...</span></p>
        </div>
    </div>

    <div class="flex gap-4 overflow-x-auto p-4 bg-white shadow-sm font-medium">
        <button class="text-pink-500 border-b-2 border-pink-500 pb-1">All</button>
        <button class="text-gray-500 pb-1">Ladies</button>
        <button class="text-gray-500 pb-1">Sports</button>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
        </div>

    <script>
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let html = '';
                rows.forEach((row, index) => {
                    if (index === 0) return; // Header skip

                    const name = row.c[0] ? row.c[0].v : 'Product';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const img = row.c[2] ? row.c[2].v : '';

                    if(img) {
                        html += `
                        <div class="product-card">
                            <img src="${img.trim()}" class="w-full h-40 object-contain p-2">
                            <div class="p-2">
                                <p class="text-gray-800 text-sm truncate font-medium">${name}</p>
                                <p class="text-lg font-bold">₹${price} <span class="text-xs text-green-500 font-normal">Free Delivery</span></p>
                                <button class="mt-2 w-full meesho-pink text-white text-xs py-2 rounded font-bold">Buy Now</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('product-list').innerHTML = html;
            } catch (e) {
                document.getElementById('product-list').innerHTML = "Sheet check karein!";
            }
        }
        loadProducts();
    </script>
</body>
</html>
