<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Meesho Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meesho-pink { background-color: #f43397; }
        .product-card { border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        /* Image fix for better look */
        .product-img { width: 100%; height: 160px; object-fit: contain; background: white; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="meesho-pink p-4 sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between text-white">
            <h1 class="text-xl font-bold italic">NnCart</h1>
            <div class="flex gap-4">
                <span>🔍</span>
                <span>🛒</span>
            </div>
        </div>
        <div class="mt-3">
            <input type="text" placeholder="Search for products..." class="w-full p-2 rounded-md outline-none text-gray-700">
        </div>
    </header>

    <div class="p-2">
        <div class="bg-pink-100 rounded-lg p-4 text-center border border-pink-200">
            <h2 class="text-pink-600 font-bold text-md">Special Discount! 🛍️</h2>
            <p class="text-gray-600 text-sm">Get 20% off on your first order</p>
        </div>
    </div>

    <div class="flex gap-4 overflow-x-auto px-4 py-2 bg-white shadow-sm no-scrollbar">
        <button class="px-4 py-1 border rounded-full text-sm whitespace-nowrap bg-pink-50 border-pink-500 text-pink-500">All</button>
        <button class="px-4 py-1 border rounded-full text-sm whitespace-nowrap">Shoes</button>
        <button class="px-4 py-1 border rounded-full text-sm whitespace-nowrap">Men</button>
        <button class="px-4 py-1 border rounded-full text-sm whitespace-nowrap">Kids</button>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
        <p class="col-span-2 text-center text-gray-400 py-10 text-sm italic">Loading products...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        // JSON endpoint for real-time data
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                // Google JSON data formatting
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let html = '';
                
                // Rows loop (Start from index 1 to skip header)
                rows.forEach((row, index) => {
                    if (index === 0) return; 

                    const name = row.c[0] ? row.c[0].v : 'No Name';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const img = row.c[2] ? row.c[2].v : '';

                    // Agar link hai tabhi card dikhao
                    if(img) {
                        html += `
                        <div class="product-card bg-white flex flex-col justify-between">
                            <img src="${img.trim()}" class="product-img" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                            <div class="p-2">
                                <p class="text-gray-500 text-xs truncate font-medium uppercase tracking-tighter">${name}</p>
                                <p class="text-lg font-bold text-gray-900 mt-1">₹${price}</p>
                                <div class="bg-gray-100 text-[10px] inline-block px-2 py-0.5 rounded-full text-gray-600 mt-1">Free Delivery</div>
                                <button class="mt-3 w-full meesho-pink text-white text-xs py-2 rounded font-bold uppercase">Buy Now</button>
                            </div>
                        </div>`;
                    }
                });
                
                document.getElementById('product-list').innerHTML = html;
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('product-list').innerHTML = "<p class='col-span-2 text-center text-red-500 py-10'>Error: Sheet check karein!</p>";
            }
        }

        // Start loading
        loadProducts();
    </script>
</body>
</html>
