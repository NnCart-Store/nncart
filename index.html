<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Pro Edition Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden pb-20">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="nn-pink p-6 text-white">
            <h2 class="text-2xl font-black italic">NnCart</h2>
            <p class="text-[10px] opacity-80 uppercase tracking-widest">Smart Store</p>
        </div>
        <nav class="flex-1 p-5 space-y-6">
            <a href="#" class="block font-bold text-gray-700 text-lg border-b pb-2">🏠 Home</a>
            <a href="#" class="block font-bold text-gray-700 text-lg border-b pb-2">🛒 My Orders</a>
            <a href="#" class="block font-bold text-gray-700 text-lg border-b pb-2">❤️ Wishlist</a>
            <a href="#" class="block font-bold text-pink-600">📞 Contact Us</a>
        </nav>
        <div class="p-4 text-center text-gray-300 text-[10px]">Version 1.0.8</div>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-3xl cursor-pointer text-gray-700" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic">NnCart</h1>
        </div>
        <div class="flex gap-4 text-2xl text-gray-500">
            <span>❤️</span>
            <span class="relative">🛒<span class="absolute -top-1 -right-1 bg-pink-600 text-[8px] text-white px-1 rounded-full border border-white">0</span></span>
        </div>
    </header>

    <div class="p-3 bg-white border-b">
        <div class="relative">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search for products..." class="w-full bg-gray-100 p-3.5 pl-12 rounded-2xl outline-none text-sm font-bold focus:ring-2 ring-pink-200">
        </div>
    </div>

    <div class="flex justify-between p-4 overflow-x-auto no-scrollbar bg-white mb-2 gap-4">
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Shoes" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-500 uppercase">Shoes</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Suits" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-500 uppercase">Suits</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Kids" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-500 uppercase">Kids</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Men" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-500 uppercase">Men</p>
        </div>
    </div>

    <div class="mx-4 my-2 rounded-2xl overflow-hidden shadow-lg bg-gradient-to-r from-orange-400 to-pink-600 p-6 text-center text-white relative">
        <h2 class="text-xl font-black italic uppercase tracking-widest">NNCART OFFER ZONE</h2>
        <p class="text-[10px] font-bold tracking-[0.2em] opacity-90 mt-1">UP TO 40% OFF | FREE DELIVERY</p>
    </div>

    <div class="px-5 py-3 flex items-center gap-2">
        <div class="h-5 w-1 nn-pink rounded-full"></div>
        <h2 class="text-lg font-black text-gray-800 uppercase tracking-tight">Top Picks For You</h2>
    </div>

    <main class="px-3 pb-24">
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around p-3 z-50 shadow-lg">
        <div class="text-center text-pink-600"><p class="text-xl">🏠</p><p class="text-[9px] font-bold">HOME</p></div>
        <div class="text-center text-gray-400"><p class="text-xl">📁</p><p class="text-[9px] font-bold">CATEGORIES</p></div>
        <div class="text-center text-gray-400"><p class="text-xl">🛒</p><p class="text-[9px] font-bold">MY CART</p></div>
        <div class="text-center text-gray-400"><p class="text-xl">👤</p><p class="text-[9px] font-bold">PROFILE</p></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-7 shadow-2xl relative">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-gray-800 text-center border-b pb-3">Confirm Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <select id="p_size" required class="w-full border-2 border-gray-100 p-4 rounded-2xl bg-gray-50 outline-none focus:border-pink-500 font-bold text-gray-700"></select>
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500">
                <input type="tel" id="c_phone" placeholder="Mobile Number" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500">
                <textarea id="c_address" placeholder="Complete Address" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none h-24 focus:border-pink-500"></textarea>
                <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">Confirm Order</button>
                <p onclick="closeOrder()" class="text-center text-xs font-bold text-gray-400 mt-2 uppercase cursor-pointer tracking-widest">Cancel</p>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => ({
                    name: row.c[0]?.v || "",
                    price: row.c[1]?.v || "0",
                    // FIXED: Column C (Index 2) se photo fetch ho rahi hai
                    img: row.c[2]?.v || "" 
                })).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { console.error("Data Load Error"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach((p, i) => {
                const isFootwear = p.name.toLowerCase().match(/shoe|joota|sandal|chappal/);
                let cat = isFootwear ? "shoes" : "cloth";
                const rating = (4.1 + (i % 9) / 10).toFixed(1);

                html += `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between hover:shadow-md transition relative">
                    <div class="absolute top-2 left-2 bg-pink-600 text-[8px] text-white px-2 py-0.5 rounded-full font-black z-10 uppercase tracking-tighter">New</div>
                    <img src="${p.img}" class="w-full h-44 object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=No+Photo'">
                    <div class="p-3">
                        <h3 class="font-bold text-[11px] truncate text-gray-700 uppercase tracking-tighter">${p.name}</h3>
                        <div class="flex items-center justify-between mt-1">
                            <p class="text-pink-600 font-black text-lg">₹${p.price}</p>
                            <span class="text-[9px] font-bold text-gray-400">★ ${rating}</span>
                        </div>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-2.5 rounded-xl text-[10px] font-black uppercase mt-3 tracking-widest shadow-md active:scale-95 transition-all">
                            Buy Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html || '<p class="text-center col-span-2 py-10">Searching...</p>';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(title, price, cat) {
            document.getElementById('p_title').value = title;
            document.getElementById('p_price').value = price;
            document.getElementById('modalTitle').innerText = title;
            const sizeBox = document.getElementById('p_size');
            sizeBox.innerHTML = '<option value="">Select Size</option>';
            if(cat === "shoes") {
                [6,7,8,9,10].forEach(n => sizeBox.innerHTML += `<option value="${n}">${n} No.</option>`);
            } else {
                ['S','M','L','XL','XXL'].forEach(sz => sizeBox.innerHTML += `<option value="${sz}">${sz}</option>`);
            }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Processing..."; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const response = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                if (result.created === 1) {
                    btn.innerHTML = "✅ Order Successful";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 1500); 
                }
            } catch (error) { alert("Error!"); btn.disabled = false; btn.innerText = "Confirm Order"; }
        };
    </script>
</body>
</html>
