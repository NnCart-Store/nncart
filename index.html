<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Vertical Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 overflow-x-hidden">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col">
        <div class="nn-pink p-6 text-white text-2xl font-black italic">NnCart</div>
        <nav class="flex-1 p-4 space-y-4 font-bold text-gray-700">
            <a href="#" class="block">🏠 Home</a>
            <a href="#" class="block">🛒 My Orders</a>
            <a href="#" class="block text-pink-600">📞 Contact Us</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic">NnCart</h1>
        </div>
        <div class="flex gap-4 text-xl text-gray-600"><span>❤️</span><span>🛒</span></div>
    </header>

    <div class="p-3 bg-white border-b">
        <div class="relative">
            <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search products..." class="w-full bg-gray-100 p-3.5 pl-10 rounded-xl outline-none text-sm font-bold">
        </div>
    </div>

    <div class="flex justify-between p-4 overflow-x-auto no-scrollbar bg-white mb-2 gap-4">
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center p-1 bg-gray-50 overflow-hidden shadow-sm"><img src="https://via.placeholder.com/60?text=Shoes" class="rounded-full"></div>
            <p class="text-[10px] font-bold mt-2 text-gray-600 uppercase">Shoes</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center p-1 bg-gray-50 overflow-hidden shadow-sm"><img src="https://via.placeholder.com/60?text=Suits" class="rounded-full"></div>
            <p class="text-[10px] font-bold mt-2 text-gray-600 uppercase">Suits</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center p-1 bg-gray-50 overflow-hidden shadow-sm"><img src="https://via.placeholder.com/60?text=Kids" class="rounded-full"></div>
            <p class="text-[10px] font-bold mt-2 text-gray-600 uppercase">Kids</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-100 mx-auto flex items-center justify-center p-1 bg-gray-50 overflow-hidden shadow-sm"><img src="https://via.placeholder.com/60?text=Men" class="rounded-full"></div>
            <p class="text-[10px] font-bold mt-2 text-gray-600 uppercase">Men</p>
        </div>
    </div>

    <div class="mx-3 my-2 rounded-2xl bg-gradient-to-r from-orange-500 to-pink-600 p-7 text-center text-white shadow-xl relative overflow-hidden">
        <h2 class="text-2xl font-black italic tracking-wider uppercase">NNCART OFFER ZONE</h2>
        <p class="text-[10px] font-bold uppercase tracking-widest opacity-90 mt-1">Up To 40% Off | Latest Trends</p>
    </div>

    <main class="p-3">
        <div id="product-list" class="flex flex-col gap-6 pb-24"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl relative">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-gray-800 text-center border-b pb-3">Confirm Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Select Size</label>
                    <select id="p_size" required class="w-full border p-4 rounded-xl bg-gray-50 font-bold outline-none focus:border-pink-500"></select>
                </div>
                <input type="text" id="c_name" placeholder="Your Full Name" required class="w-full border p-4 rounded-xl outline-none focus:border-pink-500">
                <input type="tel" id="c_phone" placeholder="Mobile Number" required class="w-full border p-4 rounded-xl outline-none focus:border-pink-500">
                <textarea id="c_address" placeholder="Full Address" required class="w-full border p-4 rounded-xl outline-none h-24 focus:border-pink-500"></textarea>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-4 text-gray-400 font-bold uppercase text-xs">Back</button>
                    <button type="submit" id="orderBtn" class="flex-1 nn-pink text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => ({
                    name: row.c[0]?.v || "",
                    price: row.c[1]?.v || "0",
                    // FIX: Column C (Index 2) se photo uthayega
                    img: row.c[2]?.v || ""
                })).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { alert("Error: Check Sheet Sharing or ID!"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                const isFootwear = p.name.toLowerCase().match(/shoe|joota|sandal|chappal/);
                let cat = isFootwear ? "shoes" : "cloth";

                html += `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col w-full">
                    <img src="${p.img}" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Check+Image+Link'">
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-800 truncate">${p.name}</h3>
                        <div class="flex items-center justify-between mt-1">
                            <p class="text-pink-600 font-black text-2xl">₹${p.price}</p>
                            <p class="text-[9px] text-green-600 font-black italic bg-green-50 px-2 py-1 rounded-md">FREE DELIVERY</p>
                        </div>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-4 rounded-2xl text-[12px] font-black uppercase mt-4 tracking-widest shadow-md active:scale-95 transition-all">
                            Order Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html || '<p class="text-center py-10 text-gray-400">No products found!</p>';
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(t, p, cat) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('modalTitle').innerText = t;
            const sd = document.getElementById('p_size');
            sd.innerHTML = '<option value="">Choose Size...</option>';
            if(cat === "shoes") {
                [6,7,8,9,10].forEach(n => sd.innerHTML += `<option value="${n} No.">${n} Number</option>`);
            } else {
                ['S','M','L','XL','XXL'].forEach(s => sd.innerHTML += `<option value="${s}">${s}</option>`);
            }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Processing..."; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const res = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const r = await res.json();
                if (r.created === 1) {
                    btn.innerHTML = "✅ Successful";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 1500); 
                }
            } catch (error) { alert("Error!"); btn.disabled = false; btn.innerText = "Confirm Order"; }
        };
    </script>
</body>
</html>
