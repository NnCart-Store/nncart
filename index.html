<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart Premium Store - Pro Max v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nn-pink { background: linear-gradient(135deg, #f43397 0%, #d1227b 100%); }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Navigation Styles */
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 99; transition: 0.3s; }
        #sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); left: -300px; position: fixed; inset-y: 0; width: 300px; background: white; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Animation */
        .product-card { transition: all 0.3s ease; border-radius: 2rem; }
        .product-card:active { transform: scale(0.95); }
        .buy-btn { transition: all 0.2s; position: relative; overflow: hidden; }
        .buy-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        .buy-btn:hover::after { left: 100%; }

        /* Loader */
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #f43397; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden pb-32">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col">
        <div class="nn-pink p-10 text-white rounded-br-[3rem]">
            <h2 class="text-4xl font-black italic tracking-tighter">NnCart</h2>
            <p class="text-[10px] font-bold uppercase tracking-[4px] opacity-80 mt-2">Premium Shopping App</p>
        </div>
        <nav class="flex-1 p-8 space-y-8">
            <a href="#" class="flex items-center gap-5 font-bold text-gray-700 text-xl group hover:text-pink-600 transition-all">
                <span class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-xl group-hover:bg-pink-100">🏠</span> Home
            </a>
            <a href="#" class="flex items-center gap-5 font-bold text-gray-700 text-xl group hover:text-pink-600 transition-all">
                <span class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-xl group-hover:bg-pink-100">🛒</span> My Orders
            </a>
            <a href="#" class="flex items-center gap-5 font-bold text-gray-700 text-xl group hover:text-pink-600 transition-all">
                <span class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-xl group-hover:bg-pink-100">❤️</span> Wishlist
            </a>
            <a href="#" class="flex items-center gap-5 font-bold text-pink-600 text-xl group transition-all">
                <span class="w-10 h-10 flex items-center justify-center bg-pink-100 rounded-xl">📞</span> Contact Us
            </a>
        </nav>
        <div class="p-8 border-t">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Version 5.0.1 Stable</p>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md p-5 sticky top-0 z-50 shadow-sm flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-5">
            <div class="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl cursor-pointer active:scale-90 transition-all" onclick="toggleMenu()">
                <span class="text-2xl text-gray-800">☰</span>
            </div>
            <h1 class="text-pink-600 font-black text-3xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4">
            <div class="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl relative">
                <span class="text-2xl">🛒</span>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-pink-600 text-[10px] text-white w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-bold">0</span>
            </div>
        </div>
    </header>

    <div class="p-5 bg-white">
        <div class="relative group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl transition-all group-focus-within:text-pink-500">🔍</span>
            <input type="text" id="searchInput" placeholder="What are you looking for?" class="w-full bg-gray-100 p-5 pl-14 rounded-3xl outline-none text-sm font-bold border-2 border-transparent focus:border-pink-300 focus:bg-white transition-all shadow-inner">
        </div>
    </div>

    <div class="mx-5 my-2 rounded-[2.5rem] nn-pink p-10 text-white shadow-2xl relative overflow-hidden group">
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full group-hover:scale-150 transition-all duration-700"></div>
        <h2 class="text-3xl font-black italic tracking-widest uppercase mb-2">MEGA SALE</h2>
        <p class="text-xs font-bold uppercase tracking-[5px] opacity-80 mb-6">Upto 40% Off Today</p>
        <button class="bg-white text-pink-600 px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">Shop Now</button>
    </div>

    <main class="px-4 mt-8">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-2xl font-black text-gray-800 tracking-tighter">New Arrivals</h2>
            <div class="flex gap-2">
                <div class="w-8 h-8 rounded-full bg-white border flex items-center justify-center text-xs shadow-sm">←</div>
                <div class="w-8 h-8 rounded-full bg-white border flex items-center justify-center text-xs shadow-sm">→</div>
            </div>
        </div>
        
        <div id="product-list" class="grid grid-cols-2 gap-5">
            <div class="col-span-2 flex flex-col items-center py-20">
                <span class="loader"></span>
                <p class="mt-4 font-bold text-gray-400 uppercase text-xs tracking-[3px]">Fetching Store Data...</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-xl border border-gray-100 rounded-[2.5rem] flex justify-around p-5 z-50 shadow-[0_20px_50px_rgba(0,0,0,0.15)]">
        <div class="text-center text-pink-600 flex flex-col items-center"><span class="text-2xl">🏠</span><p class="text-[8px] font-black mt-1 uppercase tracking-widest">Home</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><span class="text-2xl">🛍️</span><p class="text-[8px] font-black mt-1 uppercase tracking-widest">Store</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><span class="text-2xl">🎁</span><p class="text-[8px] font-black mt-1 uppercase tracking-widest">Offers</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><span class="text-2xl">👤</span><p class="text-[8px] font-black mt-1 uppercase tracking-widest">Account</p></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[3.5rem] p-10 shadow-3xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8">
                <button onclick="closeOrder()" class="text-gray-300 text-3xl font-light hover:text-gray-800">×</button>
            </div>
            <h3 id="modalTitle" class="text-3xl font-black mb-8 text-gray-800 tracking-tighter pr-10">Checkout</h3>
            <form id="orderForm" class="space-y-6">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Select Size</label>
                    <select id="p_size" required class="w-full border-2 border-gray-50 p-5 rounded-[1.8rem] bg-gray-50 outline-none focus:border-pink-500 font-bold transition-all text-gray-700"></select>
                </div>
                <input type="text" id="c_name" placeholder="Customer Name" required class="w-full border-2 border-gray-50 p-5 rounded-[1.8rem] bg-gray-50 outline-none focus:border-pink-500 font-bold">
                <input type="tel" id="c_phone" placeholder="Mobile Number" required class="w-full border-2 border-gray-50 p-5 rounded-[1.8rem] bg-gray-50 outline-none focus:border-pink-500 font-bold">
                <textarea id="c_address" placeholder="Full Delivery Address" required class="w-full border-2 border-gray-50 p-5 rounded-[1.8rem] bg-gray-50 outline-none focus:border-pink-500 font-bold h-32 resize-none"></textarea>
                <div class="pt-4">
                    <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-6 rounded-[2rem] font-black uppercase text-sm tracking-[4px] shadow-2xl shadow-pink-200 active:scale-95 transition-all">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map((row, index) => {
                    let rawImg = row.c[2]?.v || "";
                    let finalImg = rawImg;
                    
                    // GOOGLE DRIVE DIRECT IMAGE ENGINE (ULTIMATE FIX)
                    if(rawImg.includes('drive.google.com')){
                        let fileID = "";
                        if(rawImg.includes('/d/')) fileID = rawImg.split('/d/')[1].split('/')[0];
                        else if(rawImg.includes('id=')) fileID = rawImg.split('id=')[1].split('&')[0];
                        // Using lh3 as primary and secondary redirect for bypass
                        finalImg = `https://lh3.googleusercontent.com/d/${fileID}`;
                    }

                    return {
                        id: index,
                        name: row.c[0]?.v || "",
                        price: row.c[1]?.v || "0",
                        img: finalImg
                    };
                }).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { 
                document.getElementById('product-list').innerHTML = `<p class="col-span-2 text-center text-red-500 font-bold p-10">Data Load Error! Check Sheet Permissions.</p>`;
            }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach((p, i) => {
                const isShoe = p.name.toLowerCase().match(/shoe|joota|sandal/);
                const rating = (4.1 + (i % 9) / 10).toFixed(1);
                
                html += `
                <div class="product-card bg-white shadow-sm border border-gray-50 overflow-hidden flex flex-col justify-between relative group">
                    <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md text-pink-600 text-[9px] px-3 py-1.5 rounded-full font-black z-10 uppercase shadow-sm">★ ${rating}</div>
                    <div class="overflow-hidden h-52">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                             onerror="this.src='https://via.placeholder.com/400x500?text=Wait...Link+Checking'">
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-[14px] truncate text-gray-800 uppercase tracking-tighter mb-1">${p.name}</h3>
                        <div class="flex items-end justify-between mb-4">
                            <div>
                                <span class="text-[10px] text-gray-400 font-bold line-through">₹${Math.round(p.price * 1.5)}</span>
                                <p class="text-pink-600 font-black text-2xl leading-none">₹${p.price}</p>
                            </div>
                            <span class="text-[9px] font-black text-green-500 bg-green-50 px-2 py-1 rounded-lg">OFFER</span>
                        </div>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${isShoe ? "shoes" : "cloth"}')" 
                            class="buy-btn w-full nn-pink text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-pink-100 active:scale-95 transition-all">
                            Buy Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }

        // Search Engine
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(t, p, cat) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('modalTitle').innerText = t;
            const sd = document.getElementById('p_size');
            sd.innerHTML = '<option value="">Choose Your Size</option>';
            if(cat === "shoes") { [6,7,8,9,10,11].forEach(n => sd.innerHTML += `<option value="${n}">Size ${n}</option>`); }
            else { ['Small','Medium','Large','XL','XXL'].forEach(s => sd.innerHTML += `<option value="${s}">${s} Size</option>`); }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        // SheetDB Order System
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            const originalText = btn.innerText;
            btn.innerHTML = `<span class="flex items-center justify-center gap-3">Wait...</span>`; btn.disabled = true;
            
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};

            try {
                const res = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const r = await res.json();
                if (r.created === 1) {
                    btn.innerHTML = "✅ ORDER PLACED!";
                    btn.style.background = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = originalText; btn.style.background = ""; btn.disabled = false;
                    }, 2500); 
                }
            } catch (error) { 
                alert("Network Problem! Order Not Sent."); 
                btn.disabled = false; 
                btn.innerText = originalText;
            }
        };
    </script>
</body>
</html>
