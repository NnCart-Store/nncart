<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Order Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        #orderModal { display: none; }
        #orderModal.active { display: flex; }
        #sidebar { transition: 0.3s; left: -100%; position: fixed; top: 0; bottom: 0; width: 260px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="orderModal" class="fixed inset-0 bg-black/60 z-[200] items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Complete Your Order</h2>
            <form id="checkoutForm" class="space-y-4">
                <input type="hidden" id="orderedProduct">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
                    <input type="text" id="custName" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-pink-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Phone Number</label>
                    <input type="tel" id="custPhone" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-pink-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Address</label>
                    <textarea id="custAddress" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-pink-500"></textarea>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-3 text-gray-400 font-bold">Cancel</button>
                    <button type="submit" class="flex-1 nn-pink text-white py-3 rounded-xl font-bold">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <header class="bg-white p-3 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-gray-600 text-2xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-bold text-2xl italic">NnCart</h1>
        </div>
        <div class="text-xl">🛒</div>
    </header>

    <div class="p-4 grid grid-cols-2 gap-3" id="product-list">
        </div>

    <script>
        function toggleMenu() { /* Pehle wala logic */ }

        const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
        
        // Buy Now Click Function
        function openOrder(name) {
            document.getElementById('orderedProduct').value = name;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // Form Submit hone par Google Sheet par data bhejna
        document.getElementById('checkoutForm').onsubmit = function(e) {
            e.preventDefault();
            const orderData = {
                product: document.getElementById('orderedProduct').value,
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value
            };
            
            // Yahan hum ek alert dikhayenge (Asli order ke liye humein Google Script chahiye hogi)
            alert(`Order Placed for ${orderData.product}!\nBhai, aapki Sheet mein data bhejne ke liye humein ek Google Script link karni hogi.`);
            closeOrder();
        };

        async function loadProducts() {
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            let html = '';
            rows.forEach((row, index) => {
                if (index === 0) return;
                const name = row.c[0]?.v || 'Product';
                const price = row.c[1]?.v || '0';
                const img = row.c[2]?.v || '';
                html += `
                <div class="bg-white rounded-xl shadow-sm border p-2">
                    <img src="${img}" class="w-full h-40 object-contain">
                    <p class="text-sm font-bold mt-2">${name}</p>
                    <p class="text-pink-600 font-bold">₹${price}</p>
                    <button onclick="openOrder('${name}')" class="w-full nn-pink text-white py-2 rounded-lg mt-2 text-xs font-bold">BUY NOW</button>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }
        loadProducts();
    </script>
</body>
</html>
