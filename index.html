<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart Premium Store Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pink Theme Colors */
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .border-nn-pink { border-color: #f43397; }

        /* Custom Scrollbar Hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Sidebar Overlay Animation */
        #menuOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            transition: all 0.5s ease;
        }

        /* Sidebar Menu Drawer */
        #sidebar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            left: -320px;
            position: fixed;
            inset-y: 0;
            width: 320px;
            background: white;
            z-index: 1001;
            box-shadow: 15px 0 35px rgba(0,0,0,0.1);
            border-top-right-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
        #sidebar.active { left: 0; }

        /* Product Card Design (2 Columns) */
        .product-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            position: relative;
        }
        .product-card:active { transform: scale(0.95); }
        .product-image-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background-color: #f1f1f1;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Order Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; animation: slideUp 0.4s ease; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Controls */
        .input-box {
            width: 100%;
            border: 2px solid #f0f0f0;
            padding: 1rem;
            border-radius: 1.2rem;
            outline: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .input-box:focus { border-color: #f43397; background-color: #fff; }

        /* Skeleton Loading Effect */
        .skeleton {
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div id="menuOverlay" onclick="toggleMenu()"></div>

    <div id="sidebar" class="flex flex-col">
        <div class="nn-pink p-10 text-white rounded-tr-[2rem]">
            <h2 class="text-4xl font-black italic tracking-tighter">NnCart</h2>
            <p class="text-[10px] font-bold uppercase tracking-[3px] opacity-80 mt-1">Official Premium Store</p>
        </div>
        <nav class="flex-1 p-8 space-y-8">
            <div class="flex items-center gap-4 text-gray-700 font-bold text-xl">
                <span class="p-3 bg-gray-100 rounded-2xl">🏠</span> Home
            </div>
            <div class="flex items-center gap-4 text-gray-700 font-bold text-xl">
                <span class="p-3 bg-gray-100 rounded-2xl">🛍️</span> Shop by Category
            </div>
            <div class="flex items-center gap-4 text-gray-700 font-bold text-xl">
                <span class="p-3 bg-gray-100 rounded-2xl">📦</span> My Orders
            </div>
            <div class="flex items-center gap-4 text-nn-pink font-bold text-xl">
                <span class="p-3 bg-pink-100 rounded-2xl">📞</span> Contact Support
            </div>
        </nav>
        <div class="p-10 border-t">
            <p class="text-xs text-gray-400 font-bold text-center">App Build v5.8.2 - 2024</p>
        </div>
    </div>

    <header class="bg-white p-5 sticky top-0 z-50 shadow-sm flex items-center justify-between border-b">
        <div class="flex items-center gap-5">
            <div class="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl cursor-pointer shadow-inner" onclick="toggleMenu()">
                <span class="text-2xl">☰</span>
            </div>
            <h1 class="text-pink-600 font-black text-3xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4">
            <div class="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl relative shadow-inner">
                <span class="text-2xl">🛒</span>
                <span class="absolute -top-1 -right-1 bg-pink-600 text-[10px] text-white w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-black">0</span>
            </div>
        </div>
    </header>

    <div class="p-5 bg-white">
        <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl">🔍</span>
            <input type="text" id="searchInput" placeholder="Search for products, brands..." class="w-full bg-gray-100 p-5 pl-14 rounded-[1.5rem] outline-none font-bold text-gray-700 border-2 border-transparent focus:border-pink-300 transition-all">
        </div>
    </div>

    <main class="px-4 mt-4 pb-32">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-2xl font-black text-gray-800 tracking-tighter uppercase italic">Featured Products</h2>
        </div>

        <div id="product-list" class="grid grid-cols-2 gap-5">
            <div class="product-card skeleton h-64"></div>
            <div class="product-card skeleton h-64"></div>
            <div class="product-card skeleton h-64"></div>
            <div class="product-card skeleton h-64"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around p-5 z-[999] shadow-2xl">
        <div class="flex flex-col items-center text-pink-600">
            <span class="text-2xl">🏠</span>
            <span class="text-[9px] font-black uppercase mt-1">Home</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">🔍</span>
            <span class="text-[9px] font-black uppercase mt-1">Search</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">🛍️</span>
            <span class="text-[9px] font-black uppercase mt-1">Orders</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">👤</span>
            <span class="text-[9px] font-black uppercase mt-1">Profile</span>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-3xl overflow-hidden relative">
            <button onclick="closeOrder()" class="absolute top-5 right-5 text-gray-400 text-3xl font-light hover:text-gray-900 transition-all">&times;</button>
            <h3 id="modalTitle" class="text-3xl font-black mb-8 text-gray-800 tracking-tighter border-b pb-4">Check Out</h3>
            
            <form id="orderForm" class="space-y-5">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Confirm Size</label>
                    <select id="p_size" required class="input-box bg-gray-50"></select>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Full Name</label>
                    <input type="text" id="c_name" placeholder="Enter your name" required class="input-box bg-gray-50">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Phone Number</label>
                    <input type="tel" id="c_phone" placeholder="Enter mobile number" required class="input-box bg-gray-50">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Shipping Address</label>
                    <textarea id="c_address" placeholder="Full address with pincode" required class="input-box bg-gray-50 h-28 resize-none"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-6 rounded-[1.5rem] font-black uppercase text-sm tracking-[3px] shadow-2xl shadow-pink-200 active:scale-95 transition-all">Place Your Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // TOGGLE MENU FUNCTION
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('menuOverlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];

        // LOAD DATA FROM GOOGLE SHEETS
        window.onload = loadData;

        async function loadData() {
            // YOUR REAL GOOGLE SHEET ID
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            
            try {
                const response = await fetch(url);
                const dataText = await response.text();
                // Parsing the JSON from Google's response
                const jsonData = JSON.parse(dataText.substring(47).slice(0, -2));
                const rows = jsonData.table.rows;

                allProducts = rows.map((row) => {
                    let imageRaw = row.c[2]?.v || "";
                    let imageProcessed = imageRaw;

                    // TRIPLE-LAYER PHOTO FIX ENGINE
                    if (imageRaw.includes('drive.google.com')) {
                        let fileId = "";
                        if (imageRaw.includes('/d/')) {
                            fileId = imageRaw.split('/d/')[1].split('/')[0];
                        } else if (imageRaw.includes('id=')) {
                            fileId = imageRaw.split('id=')[1].split('&')[0];
                        }
                        // This is the most stable direct link for mobile browsers
                        imageProcessed = `https://lh3.googleusercontent.com/u/0/d/${fileId}=w800-h800-iv1`;
                    }

                    return {
                        name: row.c[0]?.v || "No Name",
                        price: row.c[1]?.v || "0",
                        image: imageProcessed
                    };
                }).filter(p => p.name !== "No Name");

                renderProducts(allProducts);

            } catch (err) {
                console.error("Critical Error Loading Data:", err);
                document.getElementById('product-list').innerHTML = `
                    <div class="col-span-2 text-center p-10 bg-white rounded-3xl">
                        <p class="text-red-500 font-bold">Error Loading Sheet! Check Permissions.</p>
                    </div>`;
            }
        }

        // RENDER PRODUCTS TO GRID
        function renderProducts(items) {
            const listContainer = document.getElementById('product-list');
            let contentHtml = "";

            items.forEach((item, index) => {
                const productType = item.name.toLowerCase().match(/shoe|joota|sandal/) ? "shoes" : "apparel";
                const fakeOldPrice = Math.round(item.price * 1.6);
                
                contentHtml += `
                    <div class="product-card group shadow-sm">
                        <div class="absolute top-3 left-3 bg-white/90 text-[8px] font-black text-pink-600 px-3 py-1 rounded-full z-10 shadow-sm border border-pink-50 uppercase">Best Seller</div>
                        <div class="product-image-container">
                            <img src="${item.image}" class="product-image" loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/400?text=Updating+Image...'">
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-[12px] truncate text-gray-800 uppercase tracking-tighter">${item.name}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-yellow-400 text-[10px]">★★★★★</span>
                                <span class="text-[8px] text-gray-400 font-bold uppercase">(99+)</span>
                            </div>
                            <div class="flex items-end justify-between mt-3">
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-400 line-through font-bold">₹${fakeOldPrice}</span>
                                    <span class="text-pink-600 font-black text-xl leading-none">₹${item.price}</span>
                                </div>
                                <div class="bg-green-50 text-green-500 text-[8px] font-black px-2 py-1 rounded uppercase">60% OFF</div>
                            </div>
                            <button onclick="openCheckout('${item.name}', '${item.price}', '${productType}')" 
                                    class="w-full nn-pink text-white py-3.5 rounded-2xl text-[10px] font-black uppercase mt-4 shadow-xl active:scale-95 transition-all">
                                Buy Now
                            </button>
                        </div>
                    </div>
                `;
            });

            listContainer.innerHTML = contentHtml || '<p class="col-span-2 text-center py-20 font-bold text-gray-400">No products found!</p>';
        }

        // SEARCH FUNCTIONALITY
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        });

        // MODAL CHECKOUT SYSTEM
        function openCheckout(title, price, type) {
            document.getElementById('p_title').value = title;
            document.getElementById('p_price').value = price;
            document.getElementById('modalTitle').innerText = title;
            
            const sizeDropdown = document.getElementById('p_size');
            sizeDropdown.innerHTML = '<option value="">Choose Your Size</option>';
            
            if (type === "shoes") {
                [6, 7, 8, 9, 10, 11].forEach(s => {
                    sizeDropdown.innerHTML += `<option value="${s}">UK/India Size ${s}</option>`;
                });
            } else {
                ['S', 'M', 'L', 'XL', 'XXL'].forEach(s => {
                    sizeDropdown.innerHTML += `<option value="${s}">Size ${s}</option>`;
                });
            }
            
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // SUBMIT ORDER TO SHEETDB
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('orderBtn');
            const originalText = submitBtn.innerText;
            
            submitBtn.innerText = "Processing Order...";
            submitBtn.disabled = true;

            const orderPayload = {
                "data": [{
                    "Product": document.getElementById('p_title').value,
                    "Price": document.getElementById('p_price').value,
                    "Size": document.getElementById('p_size').value,
                    "Customer_Name": document.getElementById('c_name').value,
                    "Phone": document.getElementById('c_phone').value,
                    "Address": document.getElementById('c_address').value,
                    "Order_Date": new Date().toLocaleString('en-IN')
                }]
            };

            try {
                const sheetDbUrl = 'https://sheetdb.io/api/v1/rfknu3rjfri7s';
                const response = await fetch(sheetDbUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderPayload)
                });

                const result = await response.json();
                
                if (result.created === 1) {
                    submitBtn.innerText = "🎉 Order Confirmed!";
                    submitBtn.style.backgroundColor = "#22c55e";
                    
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        submitBtn.innerText = originalText;
                        submitBtn.style.backgroundColor = "";
                        submitBtn.disabled = false;
                    }, 2500);
                }
            } catch (err) {
                alert("Order Failed! Check internet connection.");
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
