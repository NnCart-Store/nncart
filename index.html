<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Full Original Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        
        /* WAHI BANNER DESIGN JO PHOTO MEIN HAI */
        .offer-zone {
            background: linear-gradient(90deg, #800020 0%, #f43397 100%);
            border-radius: 1.5rem;
            text-align: center;
            padding: 30px 20px;
            color: white;
            margin: 15px;
        }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <div class="nn-pink p-8 text-white"><h2 class="text-3xl font-black italic">NnCart</h2></div>
        <nav class="p-6 space-y-6 font-bold text-gray-700">
            <a href="#" class="block border-b pb-2">🏠 Home</a>
            <a href="#" class="block border-b pb-2">🛒 My Orders</a>
            <a href="#" class="block text-pink-600">📞 Contact Us</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="text-3xl cursor-pointer" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic">NnCart</h1>
        </div>
        <div class="flex gap-4 text-2xl text-gray-600">
            <span>❤️</span>
            <div class="relative">🛒</div>
        </div>
    </header>

    <div class="p-4 bg-white border-b shadow-sm">
        <div class="relative">
            <span class="absolute left-4 top-3 text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search for Suits, Shoes..." class="w-full bg-gray-100 p-3 pl-10 rounded-lg outline-none text-sm">
        </div>
    </div>

    <div class="bg-white py-4 overflow-x-auto no-scrollbar flex gap-6 px-4">
        <div class="text-center min-w-[70px]"><div class="w-16 h-16 rounded-full border border-gray-200 mb-1 flex items-center justify-center bg-gray-50">👟</div><p class="text-[10px] font-bold">Shoes</p></div>
        <div class="text-center min-w-[70px]"><div class="w-16 h-16 rounded-full border border-gray-200 mb-1 flex items-center justify-center bg-gray-50">👔</div><p class="text-[10px] font-bold">Suits</p></div>
        <div class="text-center min-w-[70px]"><div class="w-16 h-16 rounded-full border border-gray-200 mb-1 flex items-center justify-center bg-gray-50">🧸</div><p class="text-[10px] font-bold">Kids</p></div>
        <div class="text-center min-w-[70px]"><div class="w-16 h-16 rounded-full border border-gray-200 mb-1 flex items-center justify-center bg-gray-50">👨</div><p class="text-[10px] font-bold">Men</p></div>
    </div>

    <div class="offer-zone">
        <h2 class="text-xl font-black tracking-widest uppercase mb-1">NNCART OFFER ZONE</h2>
        <p class="text-[10px] font-bold uppercase opacity-90 mb-4">Clothing & More | Up to 40% OFF</p>
        <button class="bg-white text-pink-600 px-6 py-2 rounded-full font-black text-[10px] uppercase shadow-md">Shop Now</button>
    </div>

    <div class="px-5 mb-4 border-l-4 border-pink-500 ml-4"><h3 class="text-lg font-bold text-gray-700">Products For You</h3></div>

    <main class="px-3">
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-center">Confirm Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <select id="p_size" required class="w-full border p-3 rounded-xl font-bold"></select>
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-3 rounded-xl">
                <input type="tel" id="c_phone" placeholder="Mobile Number" required class="w-full border p-3 rounded-xl">
                <textarea id="c_address" placeholder="Full Address" required class="w-full border p-3 rounded-xl h-24"></textarea>
                <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-4 rounded-xl font-black uppercase shadow-lg">Confirm Order</button>
                <button type="button" onclick="closeOrder()" class="w-full text-center mt-3 text-gray-400 font-bold uppercase text-xs">Close</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => {
                    let rawImg = row.c[2]?.v || "";
                    let finalImg = rawImg;
                    
                    // DRIVE PHOTO FIX
                    if(rawImg.includes('drive.google.com')){
                        let fileID = "";
                        if(rawImg.includes('/d/')) fileID = rawImg.split('/d/')[1].split('/')[0];
                        else if(rawImg.includes('id=')) fileID = rawImg.split('id=')[1].split('&')[0];
                        finalImg = "https://lh3.googleusercontent.com/d/" + fileID;
                    }

                    return {
                        name: row.c[0]?.v || "",
                        price: row.c[1]?.v || "0",
                        img: finalImg
                    };
                }).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { console.error("Error"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                const cat = p.name.toLowerCase().match(/shoe|joota|sandal/) ? "shoes" : "cloth";
                html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between">
                    <img src="${p.img}" class="w-full h-44 object-cover" onerror="this.src='https://via.placeholder.com/300?text=Wait+Loading...'">
                    <div class="p-3">
                        <p class="text-gray-500 text-[10px] font-bold">Worgan shoes</p>
                        <h3 class="font-bold text-[12px] truncate text-gray-800 uppercase">${p.name}</h3>
                        <p class="text-gray-800 font-black text-lg">₹${p.price}</p>
                        <p class="text-green-600 text-[10px] font-bold mb-2">Free Delivery</p>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-3 rounded-lg text-[11px] font-black uppercase shadow-md">
                            Buy Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }
