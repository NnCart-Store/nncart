<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl cursor-pointer">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-4 text-xl">
            <span>❤️</span>
            <span>🛒</span>
        </div>
    </header>

    <div class="p-3 bg-white">
        <div class="relative">
            <span class="absolute left-3 top-3 text-gray-400">🔍</span>
            <input type="text" placeholder="Search for Suits, Shoes..." class="w-full bg-gray-100 p-3 pl-10 rounded-lg outline-none text-sm">
        </div>
    </div>

    <div class="flex justify-between p-4 overflow-x-auto no-scrollbar bg-white mb-2">
        <div class="text-center min-w-[70px]">
            <div class="w-14 h-14 rounded-full border border-gray-200 mx-auto flex items-center justify-center p-1 overflow-hidden">
                <img src="https://via.placeholder.com/50" alt="Shoes">
            </div>
            <p class="text-[10px] font-bold mt-1 uppercase">Shoes</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-14 h-14 rounded-full border border-gray-200 mx-auto flex items-center justify-center p-1 overflow-hidden">
                <img src="https://via.placeholder.com/50" alt="Suits">
            </div>
            <p class="text-[10px] font-bold mt-1 uppercase">Suits</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-14 h-14 rounded-full border border-gray-200 mx-auto flex items-center justify-center p-1 overflow-hidden">
                <img src="https://via.placeholder.com/50" alt="Kids">
            </div>
            <p class="text-[10px] font-bold mt-1 uppercase">Kids</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-14 h-14 rounded-full border border-gray-200 mx-auto flex items-center justify-center p-1 overflow-hidden">
                <img src="https://via.placeholder.com/50" alt="Men">
            </div>
            <p class="text-[10px] font-bold mt-1 uppercase">Men</p>
        </div>
    </div>

    <div class="mx-3 my-2 rounded-xl overflow-hidden shadow-lg bg-gradient-to-r from-orange-500 via-pink-600 to-pink-600 p-6 text-center text-white">
        <h2 class="text-xl font-black italic">NNCART OFFER ZONE</h2>
        <p class="text-[10px] font-bold tracking-widest opacity-90">CLOTHING & MORE | UP TO 40% OFF</p>
        <button class="mt-3 bg-white text-pink-600 px-6 py-2 rounded-full text-xs font-black uppercase">Shop Now</button>
    </div>

    <div class="p-4 border-l-4 border-pink-600 ml-3 mb-2">
        <h2 class="text-xl font-black text-gray-800">Products For You</h2>
    </div>

    <main class="p-3">
        <div id="product-list" class="grid grid-cols-2 gap-4 pb-24">
            </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Confirm Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                <select id="p_size" required class="w-full border p-3 rounded-xl bg-gray-50 outline-none">
                    <option value="">Choose Size...</option>
                    <option value="S">S</option><option value="M">M</option>
                    <option value="L">L</option><option value="XL">XL</option>
                </select>
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-3 rounded-xl outline-none">
                <input type="tel" id="c_phone" placeholder="Phone Number" required class="w-full border p-3 rounded-xl outline-none">
                <textarea id="c_address" placeholder="Full Address" required class="w-full border p-3 rounded-xl outline-none h-24"></textarea>
                <div class="flex gap-3">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-3 text-gray-400">Back</button>
                    <button type="submit" id="orderBtn" class="flex-1 nn-pink text-white py-4 rounded-xl font-bold">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                let html = '';
                json.table.rows.forEach((row, i) => {
                    if(i===0) return;
                    const name = row.c[0]?.v, price = row.c[1]?.v, img = row.c[3]?.v || 'https://via.placeholder.com/150';
                    html += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                        <img src="${img}" class="w-full h-40 object-cover rounded-xl mb-2">
                        <p class="text-xs text-gray-500 mb-1">Brand Name</p>
                        <h3 class="font-bold text-sm truncate text-gray-800">${name}</h3>
                        <p class="text-gray-900 font-black text-lg">₹${price}</p>
                        <p class="text-[10px] text-green-600 font-bold mb-2">Free Delivery</p>
                        <button onclick="openOrder('${name}', '${price}')" class="w-full nn-pink text-white py-3 rounded-xl text-xs font-black uppercase">Buy Now</button>
                    </div>`;
                });
                document.getElementById('product-list').innerHTML = html;
            } catch(e) { console.log("Error"); }
        }

        function openOrder(t, p) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('orderModal').classList.add('active');
        }
        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Booking...";
            btn.disabled = true;

            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};

            try {
                const response = await fetch('https://sheetdb.io/api/v1/yis7dnol34x7k?sheet=customer%20details', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                if (response.ok) {
                    alert("Bhai, Order Successful!");
                    closeOrder();
                } else { alert("Order save nahi hua!"); }
            } catch (error) { alert("Server error!"); }
            finally { btn.innerText = "Confirm Order"; btn.disabled = false; }
        };
    </script>
</body>
</html>
