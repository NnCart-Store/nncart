<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden pb-24">

    <div id="menuOverlay" onclick="toggleMenu()"></div>

    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="nn-pink p-8 text-white">
            <h2 class="text-3xl font-black italic tracking-tighter">NnCart</h2>
            <p class="text-[10px] opacity-90 uppercase tracking-[3px] mt-1 font-bold">Premium Shopping</p>
        </div>
        <nav class="flex-1 p-6 space-y-6">
            <a href="#" class="flex items-center gap-4 font-bold text-gray-700 text-lg border-b pb-3"><span>🏠</span> Home</a>
            <a href="#" class="flex items-center gap-4 font-bold text-gray-700 text-lg border-b pb-3"><span>🛒</span> My Orders</a>
            <a href="#" class="flex items-center gap-4 font-bold text-gray-700 text-lg border-b pb-3"><span>❤️</span> Wishlist</a>
            <a href="#" class="flex items-center gap-4 font-bold text-pink-600 text-lg border-b pb-3"><span>📞</span> Contact Us</a>
            <a href="#" class="flex items-center gap-4 font-bold text-gray-700 text-lg border-b pb-3"><span>ℹ️</span> About App</a>
        </nav>
        <div class="p-6 text-center text-gray-400 text-xs font-bold uppercase tracking-widest">Version 2.0.4</div>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="text-3xl cursor-pointer text-gray-800" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-5 text-2xl text-gray-600">
            <div class="relative">❤️</div>
            <div class="relative">🛒<span class="absolute -top-2 -right-2 bg-pink-600 text-[10px] text-white w-4 h-4 flex items-center justify-center rounded-full border-2 border-white">0</span></div>
        </div>
    </header>

    <div class="p-4 bg-white border-b shadow-sm">
        <div class="relative group">
            <span class="absolute left-4 top-3.5 text-gray-400 text-xl transition-colors group-focus-within:text-pink-500">🔍</span>
            <input type="text" id="searchInput" placeholder="Search latest trends..." class="w-full bg-gray-100 p-4 pl-12 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-pink-200 focus:bg-white transition-all">
        </div>
    </div>

    <div class="bg-white py-4 mb-3 shadow-sm overflow-hidden">
        <div class="flex px-4 overflow-x-auto no-scrollbar gap-6">
            <div class="text-center min-w-[70px]">
                <div class="w-16 h-16 rounded-full border-2 border-pink-500 p-1 mb-2 mx-auto"><img src="https://via.placeholder.com/100?text=Shoes" class="w-full h-full rounded-full object-cover"></div>
                <p class="text-[10px] font-black text-gray-600 uppercase">Shoes</p>
            </div>
            <div class="text-center min-w-[70px]">
                <div class="w-16 h-16 rounded-full border-2 border-pink-100 p-1 mb-2 mx-auto"><img src="https://via.placeholder.com/100?text=Suits" class="w-full h-full rounded-full object-cover"></div>
                <p class="text-[10px] font-black text-gray-600 uppercase">Suits</p>
            </div>
            <div class="text-center min-w-[70px]">
                <div class="w-16 h-16 rounded-full border-2 border-pink-100 p-1 mb-2 mx-auto"><img src="https://via.placeholder.com/100?text=Kids" class="w-full h-full rounded-full object-cover"></div>
                <p class="text-[10px] font-black text-gray-600 uppercase">Kids</p>
            </div>
            <div class="text-center min-w-[70px]">
                <div class="w-16 h-16 rounded-full border-2 border-pink-100 p-1 mb-2 mx-auto"><img src="https://via.placeholder.com/100?text=Men" class="w-full h-full rounded-full object-cover"></div>
                <p class="text-[10px] font-black text-gray-600 uppercase">Men</p>
            </div>
        </div>
    </div>

    <div class="mx-4 my-4 rounded-[2rem] bg-gradient-to-br from-indigo-600 via-pink-600 to-orange-500 p-8 text-center text-white shadow-xl relative overflow-hidden">
        <div class="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
        <h2 class="text-2xl font-black italic tracking-widest uppercase">Festive Sale</h2>
        <p class="text-[11px] font-bold uppercase tracking-[4px] opacity-90 mt-2">Extra 20% Off | Limited Time</p>
    </div>

    <div class="px-5 py-4 flex items-center justify-between">
        <h2 class="text-xl font-black text-gray-800 tracking-tighter">Recommended For You</h2>
        <span class="text-pink-600 font-bold text-xs uppercase tracking-widest">View All</span>
    </div>

    <main class="px-3 pb-12">
        <div id="product-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-4 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <div class="text-center text-pink-600 flex flex-col items-center">
            <span class="text-2xl">🏠</span>
            <span class="text-[9px] font-black mt-1 uppercase">Home</span>
        </div>
        <div class="text-center text-gray-400 flex flex-col items-center">
            <span class="text-2xl">🔍</span>
            <span class="text-[9px] font-black mt-1 uppercase">Explore</span>
        </div>
        <div class="text-center text-gray-400 flex flex-col items-center">
            <span class="text-2xl">👜</span>
            <span class="text-[9px] font-black mt-1 uppercase">Orders</span>
        </div>
        <div class="text-center text-gray-400 flex flex-col items-center">
            <span class="text-2xl">👤</span>
            <span class="text-[9px] font-black mt-1 uppercase">Profile</span>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl transform transition-all scale-100">
            <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h3 id="modalTitle" class="text-2xl font-black mb-6 text-gray-800 text-center border-b pb-4 tracking-tighter">Confirm Purchase</h3>
            <form id="orderForm" class="space-y-5">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Select Your Size</label>
                    <select id="p_size" required class="w-full border-2 border-gray-100 p-4 rounded-2xl bg-gray-50 outline-none focus:border-pink-500 font-bold text-gray-700 transition-all"></select>
                </div>
                <input type="text" id="c_name" placeholder="Enter Full Name" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500 font-bold placeholder:text-gray-300">
                <input type="tel" id="c_phone" placeholder="Enter Mobile Number" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500 font-bold placeholder:text-gray-300">
                <textarea id="c_address" placeholder="Enter Complete Delivery Address" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none h-28 focus:border-pink-500 font-bold placeholder:text-gray-300 resize-none"></textarea>
                <div class="pt-2">
                    <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-5 rounded-[1.5rem] font-black uppercase text-sm tracking-widest shadow-xl active:scale-95 transition-all">Confirm My Order</button>
                    <button type="button" onclick="closeOrder()" class="w-full text-center mt-5 text-[10px] font-black text-gray-400 uppercase tracking-[3px]">Maybe Later</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            https://docs.google.com/spreadsheets/d/15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E/edit?usp=drivesdk
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map((row, index) => {
                    let rawImg = row.c[2]?.v || "";
                    let finalImg = rawImg;
                    
                    // FIXED GOOGLE DRIVE IMAGE LOGIC
                    if(rawImg.includes('drive.google.com')){
                        let fileID = "";
                        if(rawImg.includes('/d/')){ fileID = rawImg.split('/d/')[1].split('/')[0]; }
                        else if(rawImg.includes('id=')){ fileID = rawImg.split('id=')[1].split('&')[0]; }
                        finalImg = "https://lh3.googleusercontent.com/d/" + fileID;
                    }

                    return {
                        id: index,
                        name: row.c[0]?.v || "",
                        price: row.c[1]?.v || "0",
                        img: finalImg
                    };
                }).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { console.error("Critical: Product Load Failed"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach((p, i) => {
                const cat = p.name.toLowerCase().match(/shoe|joota|sandal/) ? "shoes" : "cloth";
                const rating = (4.2 + (i % 8) / 10).toFixed(1);
                const reviews = 20 + (i * 12);

                html += `
                <div class="product-card bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between relative">
                    <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-pink-600 text-[8px] px-3 py-1 rounded-full font-black z-10 uppercase border border-pink-100">Top Rated</div>
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-t-[2rem]" onerror="this.src='https://via.placeholder.com/300x400?text=Wait...'">
                    <div class="p-4">
                        <h3 class="font-bold text-[13px] truncate text-gray-800 uppercase tracking-tighter">${p.name}</h3>
                        <div class="flex items-center gap-2 mt-1 mb-2">
                            <span class="text-yellow-400 text-xs font-bold">★ ${rating}</span>
                            <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">(${reviews} reviews)</span>
                        </div>
                        <div class="flex items-end justify-between">
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold line-through">₹${Math.round(p.price * 1.4)}</p>
                                <p class="text-pink-600 font-black text-xl leading-none">₹${p.price}</p>
                            </div>
                            <p class="text-[8px] font-black text-green-500 bg-green-50 px-2 py-1 rounded">SAVE 40%</p>
                        </div>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-3.5 rounded-2xl text-[10px] font-black uppercase mt-4 tracking-widest shadow-lg shadow-pink-100 transition-all">
                            Add To Cart
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html || '<p class="text-center col-span-2 py-10">Searching catalog...</p>';
        }

        // Search Engine
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(t, p, cat) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('modalTitle').innerText = t;
            const sd = document.getElementById('p_size');
            sd.innerHTML = '<option value="">Select Required Size</option>';
            if(cat === "shoes") { [6,7,8,9,10,11].forEach(n => sd.innerHTML += `<option value="${n}">${n} UK/India</option>`); }
            else { ['Small','Medium','Large','XL','XXL'].forEach(s => sd.innerHTML += `<option value="${s}">${s} Size</option>`); }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        // Order Submission to SheetDB
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerHTML = `<span class="animate-pulse">Placing Order...</span>`; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const res = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const r = await res.json();
                if (r.created === 1) {
                    btn.innerHTML = "🎉 Order Confirmed!";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm My Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 2000); 
                }
            } catch (error) { alert("Network Error! Try Again."); btn.disabled = false; }
        };
    </script>
</body>
</html>
