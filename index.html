<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Online Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meesho-pink { background-color: #f43397; }
        .product-card { border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100">

    <header class="meesho-pink p-4 sticky top-0 z-50 text-white">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold italic">NnCart</h1>
            <div class="flex gap-4"><span>🔍</span><span>🛒</span></div>
        </div>
        <div class="mt-3">
            <input type="text" placeholder="Search for products..." class="w-full p-2 rounded-md text-gray-700 outline-none">
        </div>
    </header>

    <div class="p-2">
        <div class="bg-pink-100 rounded-lg p-6 text-center border-2 border-pink-300">
            <h2 class="text-pink-600 font-bold text-lg">Special Discount! 🛍️</h2>
            <p class="text-gray-600 italic font-bold text-xl">Get 40% OFF on your first order</p>
        </div>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
        <p class="col-span-2 text-center text-gray-500">Products load ho rahe hain...</p>
    </div>

    <script>
        // Aapki Sheet ki ID yahan set hai
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let html = '';
                // Row 1 Heading hai, isliye i=1 se start kiya
                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i].c[0] ? rows[i].c[0].v : "Product Name";
                    const price = rows[i].c[1] ? rows[i].c[1].v : "0";
                    const img = rows[i].c[2] ? rows[i].c[2].v : "https://via.placeholder.com/200";

                    html += `
                    <div class="product-card bg-white">
                        <img src="${img}" class="w-full h-40 object-cover" onerror="this.src='https://via.placeholder.com/200'">
                        <div class="p-2">
                            <p class="text-gray-800 text-sm truncate font-medium">${name}</p>
                            <p class="text-lg font-bold text-gray-900">₹${price} <span class="text-xs text-green-500 font-normal">Free Delivery</span></p>
                            <button class="mt-2 w-full meesho-pink text-white text-xs py-2 rounded font-bold">Buy Now</button>
                        </div>
                    </div>`;
                }
                document.getElementById('product-list').innerHTML = html;
            } catch (error) {
                document.getElementById('product-list').innerHTML = "<p class='col-span-2 text-center text-red-500'>Error: Sheet check karein!</p>";
            }
        }

        loadProducts();
    </script>
</body>
</html>
