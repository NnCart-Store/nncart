<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NnCart | Premium Mall</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        
        /* Premium Pink Gradient */
        .pink-gradient {
            background: linear-gradient(135deg, #ff2d81 0%, #d61a5e 100%);
        }

        /* Floating Navigation Style */
        .floating-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Shadow & Glow Effects */
        .pink-glow { box-shadow: 0 10px 20px rgba(255, 45, 129, 0.3); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.03); }

        /* Smooth Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: fadeInUp 0.5s ease forwards; }

        /* Circular Button Style */
        .nav-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff2d81;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="px-6 py-4 flex justify-between items-center bg-white/50 backdrop-blur-md sticky top-0 z-50">
        <div class="bg-gray-100 p-3 rounded-2xl">
            <i class="fa-solid fa-bars-staggered text-gray-800 text-xl"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tighter text-[#ff2d81]">NnCart</h1>
        <div class="relative bg-gray-100 p-3 rounded-2xl">
            <i class="fa-solid fa-cart-shopping text-gray-800 text-xl"></i>
            <span class="absolute -top-1 -right-1 bg-[#ff2d81] text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-white">0</span>
        </div>
    </header>

    <div class="px-6 mt-4">
        <div class="relative group">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="search" onkeyup="searchProducts()" placeholder="What are you looking for?" 
            class="w-full bg-gray-100/80 border-none rounded-[2rem] py-5 pl-14 pr-6 text-sm focus:ring-2 focus:ring-[#ff2d81]/20 outline-none transition-all">
        </div>
    </div>

    <div class="px-6 mt-8">
        <div class="pink-gradient rounded-[2.5rem] p-8 relative overflow-hidden pink-glow animate-item">
            <div class="relative z-10">
                <h2 class="text-white text-4xl font-black italic tracking-wider leading-none uppercase">MEGA SALE</h2>
                <p class="text-white/80 font-bold text-xs mt-3 tracking-[3px] uppercase">Upto 40% OFF TODAY</p>
                <button class="mt-6 bg-white text-[#ff2d81] px-10 py-3 rounded-full font-black text-xs uppercase tracking-tighter">Shop Now</button>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full"></div>
            <div class="absolute right-10 top-0 w-20 h-20 bg-white/5 rounded-full"></div>
        </div>
    </div>

    <div class="px-6 mt-10 flex justify-between items-end">
        <div>
            <h3 class="text-2xl font-extrabold text-gray-900 tracking-tight">New Arrivals</h3>
        </div>
        <div class="flex gap-2">
            <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-white"><i class="fa-solid fa-arrow-left text-xs"></i></button>
            <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-white"><i class="fa-solid fa-arrow-right text-xs"></i></button>
        </div>
    </div>

    <main id="storeGrid" class="px-6 mt-6 grid grid-cols-2 gap-6 pb-20">
        <div class="col-span-full flex flex-col items-center py-20">
            <div class="loader"></div>
            <p class="mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Loading Catalog...</p>
        </div>
    </main>

    <div class="fixed bottom-8 inset-x-6 z-50">
        <nav class="floating-nav rounded-[2.5rem] p-3 flex justify-around items-center">
            <button onclick="window.location.reload()" class="flex flex-col items-center gap-1 group">
                <div class="nav-circle bg-pink-50 text-[#ff2d81]">
                    <i class="fa-solid fa-house text-lg"></i>
                </div>
                <span class="text-[9px] font-bold text-[#ff2d81] uppercase tracking-tighter">Home</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-400">
                <div class="nav-circle hover:bg-gray-50">
                    <i class="fa-solid fa-shop text-lg"></i>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Store</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-400">
                <div class="nav-circle hover:bg-gray-50">
                    <i class="fa-solid fa-gift text-lg"></i>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Offers</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-400">
                <div class="nav-circle hover:bg-gray-50">
                    <i class="fa-solid fa-user text-lg"></i>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Account</span>
            </button>
        </nav>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end justify-center">
        <div class="bg-white w-full rounded-t-[3rem] p-8 animate-item">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6" onclick="toggleModal()"></div>
            <h2 id="p_title" class="text-2xl font-black text-gray-800 uppercase italic mb-2">Item Name</h2>
            <p id="p_price_display" class="text-[#ff2d81] text-xl font-bold mb-6">₹000</p>
            
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_name">
                <select id="p_size" class="w-full bg-gray-50 rounded-2xl p-4 font-bold border-none outline-none" required>
                    <option value="">Choose Size</option>
                </select>
                <input type="text" id="c_name" placeholder="Full Name" class="w-full bg-gray-50 rounded-2xl p-4 font-bold outline-none" required>
                <input type="tel" id="c_phone" placeholder="WhatsApp Number" class="w-full bg-gray-50 rounded-2xl p-4 font-bold outline-none" required>
                <textarea id="c_address" placeholder="Address" class="w-full bg-gray-50 rounded-2xl p-4 font-bold outline-none h-24" required></textarea>
                <button type="submit" id="submitBtn" class="w-full pink-gradient text-white font-black py-5 rounded-[2rem] pink-glow uppercase tracking-widest">Confirm Order</button>
            </form>
        </div>
    </div>

    <script>
                const API_CONFIG = {
            SID: '15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E',
            SNAME: 'Sheet1',
            SHEETDB: 'https://sheetdb.io/api/v1/rfknu3rjfri7s'
        };
        
        let allData = [];

        async function fetchStore() {
            const url = `https://docs.google.com/spreadsheets/d/${API_CONFIG.SID}/gviz/tq?tqx=out:json&sheet=${API_CONFIG.SNAME}`;
            try {
                const r = await fetch(url);
                const t = await r.text();
                const j = JSON.parse(t.substring(47, t.length - 2));
                
                allData = j.table.rows.map(row => {
                    let rImg = row.c[4]?.v || ""; // Column E
                    let id = "";
                    if(rImg.includes('d/')) id = rImg.split('d/')[1].split('/')[0];
                    else if(rImg.includes('id=')) id = rImg.split('id=')[1].split('&')[0];
                    
                    return {
                        name: row.c[0]?.v || "",
                        price: row.c[1]?.v || "0",
                        img: id ? `https://googleusercontent.com/profile/picture/0${id}` : rImg
                    };
                }).filter(x => x.name !== "");
                render(allData);
            } catch (e) { alert("Sheet Error!"); }
        }

        function render(list) {
            const grid = document.getElementById('storeGrid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white rounded-[2.5rem] p-3 card-shadow animate-item">
                    <div class="bg-gray-50 rounded-[2rem] overflow-hidden aspect-square mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300?text=NnCart'">
                    </div>
                    <h4 class="font-bold text-gray-800 text-[12px] px-2 truncate uppercase tracking-tight">${p.name}</h4>
                    <div class="flex items-center justify-between px-2 mt-2 mb-2">
                        <span class="text-[#ff2d81] font-black text-lg italic">₹${p.price}</span>
                    </div>
                    <button onclick="openBuy('${p.name}', '${p.price}')" class="w-full bg-gray-900 text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Buy Now</button>
                </div>
            `).join('');
        }

        function searchProducts() {
            const q = document.getElementById('search').value.toLowerCase();
            render(allData.filter(p => p.name.toLowerCase().includes(q)));
        }

        function openBuy(name, price) {
            document.getElementById('p_name').value = name;
            document.getElementById('p_title').innerText = name;
            document.getElementById('p_price_display').innerText = `₹${price}`;
            const sz = document.getElementById('p_size');
            sz.innerHTML = '<option value="">Select Size</option>';
            [4,5,6,7,8,9,10].forEach(n => sz.innerHTML += `<option value="${n}">Size ${n}</option>`);
            document.getElementById('orderModal').classList.remove('hidden');
            document.getElementById('orderModal').classList.add('flex');
        }

        function toggleModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                data: [{
                    "Name": document.getElementById('c_name').value,
                    "Phone": document.getElementById('c_phone').value,
                    "Product": document.getElementById('p_name').value,
                    "Size": document.getElementById('p_size').value,
                    "Address": document.getElementById('c_address').value,
                    "Date": new Date().toLocaleString()
                }]
            };

            try {
                const res = await fetch(API_CONFIG.SHEETDB, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert("Order Success! 🎉");
                    toggleModal();
                    e.target.reset();
                }
            } catch (e) { alert("Error!"); }
            btn.innerText = "Confirm Order"; btn.disabled = false;
        };

        fetchStore();
    </script>
</body>
</html>
