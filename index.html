                   <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden pb-24">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="nn-pink p-6 text-white"><h2 class="text-2xl font-black italic">NnCart</h2></div>
        <nav class="flex-1 p-5 space-y-6">
            <a href="#" class="block font-bold text-gray-700">🏠 Home</a>
            <a href="#" class="block font-bold text-gray-700">🛒 My Orders</a>
            <a href="#" class="block font-bold text-pink-600">📞 Contact Us</a>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-3xl cursor-pointer text-gray-700" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic">NnCart</h1>
        </div>
        <div class="flex gap-4 text-2xl text-gray-500"><span>❤️</span><span>🛒</span></div>
    </header>

    <div class="p-3 bg-white border-b">
        <div class="relative">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search products..." class="w-full bg-gray-100 p-3.5 pl-12 rounded-2xl outline-none text-sm font-bold">
        </div>
    </div>

    <div class="flex justify-between p-4 overflow-x-auto no-scrollbar bg-white mb-2 gap-4">
        <div class="text-center min-w-[70px]"><div class="w-14 h-14 rounded-full border-2 border-pink-100 mx-auto overflow-hidden"><img src="https://via.placeholder.com/60?text=S" class="w-full h-full object-cover"></div><p class="text-[10px] font-bold mt-1 uppercase">Shoes</p></div>
        <div class="text-center min-w-[70px]"><div class="w-14 h-14 rounded-full border-2 border-pink-100 mx-auto overflow-hidden"><img src="https://via.placeholder.com/60?text=U" class="w-full h-full object-cover"></div><p class="text-[10px] font-bold mt-1 uppercase">Suits</p></div>
        <div class="text-center min-w-[70px]"><div class="w-14 h-14 rounded-full border-2 border-pink-100 mx-auto overflow-hidden"><img src="https://via.placeholder.com/60?text=K" class="w-full h-full object-cover"></div><p class="text-[10px] font-bold mt-1 uppercase">Kids</p></div>
        <div class="text-center min-w-[70px]"><div class="w-14 h-14 rounded-full border-2 border-pink-100 mx-auto overflow-hidden"><img src="https://via.placeholder.com/60?text=M" class="w-full h-full object-cover"></div><p class="text-[10px] font-bold mt-1 uppercase">Men</p></div>
    </div>

    <main class="px-3 mt-2">
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-7 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-center border-b pb-2">Order Now</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title"><input type="hidden" id="p_price">
                <select id="p_size" required class="w-full border p-4 rounded-2xl bg-gray-50 outline-none font-bold text-gray-700"></select>
                <input type="text" id="c_name" placeholder="Full Name" required class="w-full border p-4 rounded-2xl outline-none">
                <input type="tel" id="c_phone" placeholder="Mobile Number" required class="w-full border p-4 rounded-2xl outline-none">
                <textarea id="c_address" placeholder="Address" required class="w-full border p-4 rounded-2xl outline-none h-24"></textarea>
                <button type="submit" id="orderBtn" class="w-full nn-pink text-white py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Order</button>
                <p onclick="closeOrder()" class="text-center text-xs font-bold text-gray-400 mt-2 cursor-pointer">CANCEL</p>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];
        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => ({
                    name: row.c[0]?.v || "",
                    price: row.c[1]?.v || "0",
                    img: row.c[2]?.v || "" // Correct: Column C
                })).filter(p => p.name !== "");

                displayProducts(allProducts);
            } catch(e) { alert("Sheet Error!"); }
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                const cat = p.name.toLowerCase().match(/shoe|joota|sandal/) ? "shoes" : "cloth";
                html += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-t-2xl" onerror="this.src='https://via.placeholder.com/200?text=No+Photo'">
                    <div class="p-3">
                        <h3 class="font-bold text-[11px] truncate text-gray-700 uppercase">${p.name}</h3>
                        <p class="text-pink-600 font-black text-lg">₹${p.price}</p>
                        <button onclick="openOrder('${p.name}', '${p.price}', '${cat}')" 
                            class="w-full nn-pink text-white py-2.5 rounded-xl text-[10px] font-black uppercase mt-2 shadow-md">
                            Buy Now
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(t, p, cat) {
            document.getElementById('p_title').value = t;
            document.getElementById('p_price').value = p;
            document.getElementById('modalTitle').innerText = t;
            const sd = document.getElementById('p_size');
            sd.innerHTML = '<option value="">Size...</option>';
            if(cat === "shoes") { [6,7,8,9,10].forEach(n => sd.innerHTML += `<option value="${n}">${n} No.</option>`); }
            else { ['S','M','L','XL','XXL'].forEach(s => sd.innerHTML += `<option value="${s}">${s}</option>`); }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Wait..."; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const res = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const r = await res.json();
                if (r.created === 1) {
                    btn.innerHTML = "✅ DONE";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 1500); 
                }
            } catch (error) { alert("Error!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
