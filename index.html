<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart - Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nn-pink { background-color: #f43397; }
        .text-nn-pink { color: #f43397; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #menuOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        #sidebar { transition: 0.3s; left: -280px; position: fixed; inset-y: 0; width: 280px; background: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="flex flex-col">
        <div class="nn-pink p-6 text-white">
            <h2 class="text-2xl font-black italic">NnCart</h2>
            <p class="text-[10px] opacity-80">Shopping Made Easy</p>
        </div>
        <nav class="flex-1 p-4 space-y-5">
            <a href="#" class="block font-bold text-gray-700 text-lg">🏠 Home</a>
            <a href="#" class="block font-bold text-gray-700 text-lg">🛒 My Orders</a>
            <a href="#" class="block font-bold text-gray-700 text-lg">📁 Categories</a>
            <a href="#" class="block font-bold text-gray-700 text-lg">❤️ Wishlist</a>
            <hr class="border-gray-100">
            <a href="#" class="block font-bold text-pink-600">📞 Contact Us</a>
            <a href="#" class="block font-bold text-red-500">🚪 Logout</a>
        </nav>
        <div class="p-4 text-center text-gray-300 text-[10px]">App Version 1.0.6</div>
    </div>

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-3xl cursor-pointer text-gray-700" onclick="toggleMenu()">☰</span>
            <h1 class="text-pink-600 font-black text-2xl italic tracking-tighter">NnCart</h1>
        </div>
        <div class="flex gap-5 text-2xl text-gray-600">
            <span class="cursor-pointer">❤️</span>
            <span onclick="showCart()" class="relative cursor-pointer">🛒<span id="cart-count" class="absolute -top-2 -right-2 bg-pink-600 text-white text-[10px] px-1.5 rounded-full">0</span></span>
            
    </header>

    <div class="p-3 bg-white border-b border-gray-100">
        <div class="relative">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search for Suits, Shoes, and more..." class="w-full bg-gray-100 p-3.5 pl-12 rounded-xl outline-none text-sm font-bold">
        </div>
    </div>

    <div class="flex justify-between p-4 overflow-x-auto no-scrollbar bg-white mb-2 gap-4">
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-200 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Shoes" alt="Shoes" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-600 uppercase tracking-tighter">Shoes</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-200 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Suits" alt="Suits" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-600 uppercase tracking-tighter">Suits</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-200 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Kids" alt="Kids" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-600 uppercase tracking-tighter">Kids</p>
        </div>
        <div class="text-center min-w-[70px]">
            <div class="w-16 h-16 rounded-full border-2 border-pink-200 mx-auto flex items-center justify-center bg-gray-50 overflow-hidden shadow-sm p-1">
                <img src="https://via.placeholder.com/60?text=Men" alt="Men" class="rounded-full object-cover">
            </div>
            <p class="text-[10px] font-black mt-2 text-gray-600 uppercase tracking-tighter">Men</p>
        </div>
    </div>

    <div class="mx-4 my-3 rounded-2xl overflow-hidden shadow-xl bg-gradient-to-br from-orange-400 via-pink-600 to-purple-700 p-7 text-center text-white relative">
        <h2 class="text-2xl font-black italic uppercase tracking-widest">NNCART OFFER ZONE</h2>
        <p class="text-[10px] font-bold tracking-[0.2em] opacity-90 mt-1">LATEST TRENDS | UP TO 40% OFF</p>
        <button class="mt-4 bg-white text-pink-600 px-8 py-2.5 rounded-full text-xs font-black uppercase shadow-lg active:scale-95 transition">Shop Now</button>
    </div>

    <div class="px-5 py-4 flex items-center gap-3">
        <div class="h-8 w-1.5 nn-pink rounded-full"></div>
        <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight">Products For You</h2>
    </div>

    <main class="px-4 pb-20">
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 nn-pink"></div>
            <h3 id="modalTitle" class="text-xl font-bold mb-5 text-gray-800 text-center">Confirm Your Order</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="p_title">
                <input type="hidden" id="p_price">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-pink-600 uppercase ml-1">Choose Proper Size</label>
                    <select id="p_size" required class="w-full border-2 border-gray-100 p-4 rounded-2xl bg-gray-50 outline-none focus:border-pink-500 font-bold text-gray-700"></select>
                </div>
                <input type="text" id="c_name" placeholder="Enter Your Full Name" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500 font-medium">
                <input type="tel" id="c_phone" placeholder="Enter Mobile Number" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-pink-500 font-medium">
                <textarea id="c_address" placeholder="Enter Complete Delivery Address" required class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none h-28 focus:border-pink-500 font-medium resize-none"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-4 text-gray-400 font-extrabold uppercase text-xs tracking-widest">Cancel</button>
                    <button type="submit" id="orderBtn" class="flex-1 nn-pink text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        let allProducts = [];

        window.onload = loadProducts;

        async function loadProducts() {
            const sheetID = "15PG60oUhda-ze8_36AZuFzO14fkxAwGVJwlQg8xWD4E";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substr(47).slice(0, -2));
                
                allProducts = json.table.rows.map(row => ({
                    name: row.c[0]?.v || "No Name",
                    price: row.c[1]?.v || "0",
                    img: (row.c[4]?.v || "").trim()
                })).filter(p => p.name !== "No Name");

                displayProducts(allProducts);
            } catch(e) { console.error("Data Loading Failed"); }
        }

        function displayProducts(products) {
    let html = '';
    products.forEach(p => {
        html += `
        <div class="bg-white overflow-hidden shadow-sm border border-gray-100 flex flex-col">
            <img src="${p.img}" class="w-full h-64 object-cover mb-2">
            <div class="p-2">
                <h3 class="text-[12px] text-gray-500 leading-tight h-8 overflow-hidden">${p.name}</h3>
                <div class="mt-1">
                    <span class="text-lg font-bold text-gray-900">₹${p.price}</span>
                </div>
                
                <div class="mt-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Bachhe ka Size chune</label>
                    <select id="size-${p.name}" class="w-full mt-1 border border-gray-200 rounded p-1 text-[11px] focus:outline-none bg-pink-50">
                        <option value="1-2 Years">1-2 saal</option>
                        <option value="2-3 Years">2-3 saal</option>
                        <option value="3-4 Years">3-4 saal</option>
                        <option value="4-5 Years">4-5 saal</option>
                        <option value="5-6 Years">5-6 saal</option>
                        <option value="6-7 Years">6-7 saal</option>
                        <option value="7-8 Years">7-8 saal</option>
                        <option value="8-9 Years">8-9 saal</option>
                        <option value="9-10 Years">9-10 saal</option>
                    </select>
                </div>
            </div>
            <button onclick="const sz = document.getElementById('size-${p.name}').value; openOrder('${p.name}', '${p.price}', '${p.cat || 'footwear'}', sz)" class="mx-2 mb-2 border border-pink-500 text-pink-500 py-1.5 rounded-md text-[11px] font-bold">Buy Now</button>
        </div>`;
    });
    const list = document.getElementById('product-list');
    list.className = "grid grid-cols-2 gap-2 p-2 bg-gray-50"; 
    list.innerHTML = html;
        }
        
        
        
        // --- SEARCH LOGIC ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        });

        function openOrder(title, price, cat) {
            document.getElementById('p_title').value = title;
            document.getElementById('p_price').value = price;
            document.getElementById('modalTitle').innerText = title;
            const sizeBox = document.getElementById('p_size');
            sizeBox.innerHTML = '<option value="">Select Your Size</option>';
            if(cat === "shoes") {
                [5,6,7,8,9,10].forEach(num => sizeBox.innerHTML += `<option value="${num} No.">${num} Number</option>`);
            } else {
                ['S','M','L','XL','XXL','XXXL'].forEach(sz => sizeBox.innerHTML += `<option value="${sz}">${sz}</option>`);
            }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!confirm("Bhai, Order confirm karte ho?")) return;
            const btn = document.getElementById('orderBtn');
            btn.innerText = "Processing..."; btn.disabled = true;
            const orderData = { "data": [{
                "Product": document.getElementById('p_title').value,
                "Price": document.getElementById('p_price').value,
                "Size": document.getElementById('p_size').value,
                "Customer_Name": document.getElementById('c_name').value,
                "Phone": document.getElementById('c_phone').value,
                "Address": document.getElementById('c_address').value,
                "Time": new Date().toLocaleString('en-IN')
            }]};
            try {
                const response = await fetch('https://sheetdb.io/api/v1/rfknu3rjfri7s', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                if (result.created === 1) {
                    btn.innerHTML = "✅ Order Successful";
                    btn.style.backgroundColor = "#22c55e"; 
                    setTimeout(() => {
                        closeOrder();
                        document.getElementById('orderForm').reset();
                        btn.innerText = "Confirm Order"; btn.style.backgroundColor = ""; btn.disabled = false;
                    }, 1500); 
                }
            } catch (error) { alert("Error!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
