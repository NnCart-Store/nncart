<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meesho-pink { background-color: #f43397; }
        .product-card { border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50">
    <header class="meesho-pink text-white p-4 text-center font-bold text-xl shadow-md">NnCart Store</header>
    
    <div id="product-list" class="grid grid-cols-2 gap-3 p-3">
        </div>

    <script>
        const sheetID = "1MklWzZp2Hou4bOnMujBD9aYJo2nVhsq1tCr12cHyixY";
        // Bina publish kiye data khinchne wala link
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let html = '';
                rows.forEach((row, index) => {
                    if (index === 0) return; // Heading line skip karne ke liye
                    
                    const name = row.c[0] ? row.c[0].v : 'No Name';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const img = row.c[2] ? row.c[2].v : '';

                    if(img) {
                        html += `
                        <div class="product-card bg-white shadow-sm">
                            <img src="${img.trim()}" class="w-full h-44 object-contain bg-white">
                            <div class="p-2">
                                <p class="text-gray-600 text-xs truncate">${name}</p>
                                <p class="text-lg font-bold text-gray-900 mt-1">₹${price}</p>
                                <div class="bg-gray-100 text-[10px] inline-block px-2 py-0.5 rounded-full mt-1">Free Delivery</div>
                                <button class="mt-3 w-full meesho-pink text-white text-sm py-2 rounded-md font-bold">Buy Now</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('product-list').innerHTML = html;
            } catch (e) {
                document.getElementById('product-list').innerHTML = "<p class='col-span-2 text-center'>Connection Error! Sheet check karein.</p>";
            }
        }
        loadProducts();
    </script>
</body>
</html>
